<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>我的旅行足迹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    :root {
      --bg-a: #f5f7ef;
      --bg-b: #e8efe1;
      --ink: #1f2d22;
      --accent: #2c7a5d;
      --accent-soft: #cfe7dc;
      --warn: #b15f33;
      --card: rgba(255, 255, 255, 0.88);
      --stroke: rgba(31, 45, 34, 0.16);
      --shadow: 0 16px 38px rgba(31, 45, 34, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Noto Sans SC", "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, #dcefd9 0%, transparent 30%),
        radial-gradient(circle at 90% 92%, #f1ddcb 0%, transparent 28%),
        linear-gradient(140deg, var(--bg-a), var(--bg-b));
      padding: calc(12px + env(safe-area-inset-top, 0px)) 12px calc(100px + env(safe-area-inset-bottom, 0px));
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .headline {
      padding: 12px 16px;
      border: 1px solid var(--stroke);
      border-radius: 14px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    h1 {
      font-size: clamp(1.2rem, 2.4vw, 1.8rem);
      font-family: "Manrope", sans-serif;
      letter-spacing: 0.02em;
    }

    .headline p {
      margin-top: 6px;
      color: rgba(31, 45, 34, 0.76);
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 12px;
      align-items: stretch;
    }

    .map-card,
    .history-card {
      border: 1px solid var(--stroke);
      border-radius: 14px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .map-wrap {
      position: relative;
      height: min(75vh, 740px);
      min-height: 440px;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 500;
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: rgba(250, 252, 247, 0.92);
      backdrop-filter: blur(6px);
    }

    .filter-row,
    .mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar label {
      font-size: 0.78rem;
      color: rgba(31, 45, 34, 0.75);
    }

    input[type="datetime-local"] {
      border: 1px solid var(--stroke);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 6px 8px;
      font-size: 0.82rem;
      font-family: inherit;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.84rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-main {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 18px rgba(44, 122, 93, 0.24);
    }

    .btn-plain {
      background: #fff;
      border-color: var(--stroke);
      color: var(--ink);
    }

    .mode-btn {
      background: var(--accent-soft);
      color: #174232;
    }

    .mode-btn.active {
      background: #174232;
      color: #fff;
    }

    .history-head {
      padding: 12px 12px 8px;
      border-bottom: 1px solid var(--stroke);
    }

    .history-head h2 {
      font-size: 1rem;
      font-family: "Manrope", sans-serif;
    }

    .history-head p {
      margin-top: 4px;
      font-size: 0.82rem;
      color: rgba(31, 45, 34, 0.7);
    }

    .history-list {
      list-style: none;
      max-height: min(70vh, 680px);
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--stroke);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.92);
    }

    .history-item time {
      font-size: 0.78rem;
      color: rgba(31, 45, 34, 0.7);
      display: block;
      margin-bottom: 4px;
    }

    .history-item p {
      font-size: 0.83rem;
      line-height: 1.4;
    }

    .empty {
      padding: 14px;
      border: 1px dashed var(--stroke);
      border-radius: 10px;
      font-size: 0.85rem;
      color: rgba(31, 45, 34, 0.65);
      background: rgba(255, 255, 255, 0.7);
    }

    .action-bar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      z-index: 600;
      padding: 10px;
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: rgba(251, 253, 249, 0.94);
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .status {
      font-size: 0.84rem;
      color: rgba(31, 45, 34, 0.8);
    }

    .status.warn {
      color: var(--warn);
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .map-wrap {
        height: 58vh;
        min-height: 360px;
      }

      .history-list {
        max-height: 34vh;
      }

      .filter-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .filter-row button {
        grid-column: span 1;
      }

      input[type="datetime-local"] {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="headline">
      <h1>我的旅行足迹地图</h1>
      <p>中间地图 + 右侧历史记录；点击底部按钮可记录当前位置，支持“全部地点”和“行迹轨迹”两种显示。</p>
    </header>

    <main class="grid">
      <section class="map-card" aria-label="地图区域">
        <div class="map-wrap">
          <div class="toolbar" aria-label="时间与显示筛选">
            <div class="filter-row">
              <label for="start-time">起始时间</label>
              <input id="start-time" type="datetime-local">
              <label for="end-time">结束时间</label>
              <input id="end-time" type="datetime-local">
              <button id="apply-filter" class="btn-plain" type="button">应用时间区间</button>
              <button id="clear-filter" class="btn-plain" type="button">清空区间</button>
            </div>
            <div class="mode-row">
              <button id="mode-all" class="mode-btn active" type="button">显示全部地点</button>
              <button id="mode-track" class="mode-btn" type="button">显示行迹轨迹</button>
            </div>
          </div>
          <div id="map"></div>
        </div>
      </section>

      <aside class="history-card" aria-label="历史记录">
        <div class="history-head">
          <h2>去过的地点历史</h2>
          <p id="history-meta">总计 0 条记录</p>
        </div>
        <ul id="history-list" class="history-list"></ul>
      </aside>
    </main>
  </div>

  <div class="action-bar">
    <button id="record-btn" class="btn-main" type="button">记录我当前的位置</button>
    <p id="status" class="status">准备就绪</p>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    (function () {
      var STORAGE_KEY = "travel_footprints_v1";
      var points = loadPoints();
      var currentMode = "all";

      var startInput = document.getElementById("start-time");
      var endInput = document.getElementById("end-time");
      var applyFilterBtn = document.getElementById("apply-filter");
      var clearFilterBtn = document.getElementById("clear-filter");
      var modeAllBtn = document.getElementById("mode-all");
      var modeTrackBtn = document.getElementById("mode-track");
      var recordBtn = document.getElementById("record-btn");
      var statusText = document.getElementById("status");
      var historyList = document.getElementById("history-list");
      var historyMeta = document.getElementById("history-meta");

      var map = L.map("map", { zoomControl: true }).setView([25, 110], 4);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);

      var markerLayer = L.layerGroup().addTo(map);
      var trackLayer = L.layerGroup().addTo(map);

      applyFilterBtn.addEventListener("click", function () {
        setStatus("已应用时间区间筛选", false);
        render(false);
      });

      clearFilterBtn.addEventListener("click", function () {
        startInput.value = "";
        endInput.value = "";
        setStatus("已清空时间区间", false);
        render(false);
      });

      modeAllBtn.addEventListener("click", function () {
        currentMode = "all";
        modeAllBtn.classList.add("active");
        modeTrackBtn.classList.remove("active");
        render(false);
      });

      modeTrackBtn.addEventListener("click", function () {
        currentMode = "track";
        modeTrackBtn.classList.add("active");
        modeAllBtn.classList.remove("active");
        render(false);
      });

      recordBtn.addEventListener("click", function () {
        if (!navigator.geolocation) {
          setStatus("当前浏览器不支持地理定位", true);
          return;
        }

        recordBtn.disabled = true;
        recordBtn.textContent = "定位中...";

        navigator.geolocation.getCurrentPosition(
          function (pos) {
            var point = {
              id: String(Date.now()) + "_" + String(Math.random()).slice(2, 7),
              lat: Number(pos.coords.latitude.toFixed(6)),
              lng: Number(pos.coords.longitude.toFixed(6)),
              timestamp: Date.now()
            };
            points.push(point);
            points.sort(function (a, b) { return a.timestamp - b.timestamp; });
            savePoints(points);
            setStatus("已记录：" + formatDateTime(point.timestamp), false);
            render(true);
            resetRecordButton();
          },
          function (error) {
            var message = "定位失败";
            if (error.code === 1) message = "定位失败：你拒绝了定位权限";
            if (error.code === 2) message = "定位失败：位置信息不可用";
            if (error.code === 3) message = "定位失败：获取定位超时";
            setStatus(message, true);
            resetRecordButton();
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      });

      render(false);

      function loadPoints() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed
            .filter(function (item) {
              return item && Number.isFinite(item.lat) && Number.isFinite(item.lng) && Number.isFinite(item.timestamp);
            })
            .sort(function (a, b) { return a.timestamp - b.timestamp; });
        } catch (e) {
          return [];
        }
      }

      function savePoints(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function getFilteredPoints() {
        var start = startInput.value ? new Date(startInput.value).getTime() : null;
        var end = endInput.value ? new Date(endInput.value).getTime() : null;

        return points.filter(function (p) {
          var okStart = start === null || p.timestamp >= start;
          var okEnd = end === null || p.timestamp <= end;
          return okStart && okEnd;
        });
      }

      function render(focusLatest) {
        var filtered = getFilteredPoints();
        markerLayer.clearLayers();
        trackLayer.clearLayers();

        if (currentMode === "all") {
          filtered.forEach(function (p, idx) {
            L.circleMarker([p.lat, p.lng], {
              radius: 7,
              color: "#1f5e48",
              fillColor: "#2c7a5d",
              fillOpacity: 0.88,
              weight: 2
            })
              .bindPopup("第 " + (idx + 1) + " 个点<br>" + formatDateTime(p.timestamp) + "<br>" + p.lat + ", " + p.lng)
              .addTo(markerLayer);
          });
        } else {
          var latLngs = filtered.map(function (p) {
            return [p.lat, p.lng];
          });

          if (latLngs.length > 1) {
            L.polyline(latLngs, {
              color: "#b15f33",
              weight: 4,
              opacity: 0.9,
              lineJoin: "round"
            }).addTo(trackLayer);
          }

          filtered.forEach(function (p, idx) {
            L.circleMarker([p.lat, p.lng], {
              radius: 6,
              color: "#8f4b29",
              fillColor: "#d98153",
              fillOpacity: 0.95,
              weight: 2
            })
              .bindPopup("轨迹点 " + (idx + 1) + "<br>" + formatDateTime(p.timestamp) + "<br>" + p.lat + ", " + p.lng)
              .addTo(trackLayer);
          });
        }

        renderHistory(filtered);
        adjustMap(filtered, focusLatest);
      }

      function renderHistory(filtered) {
        historyList.innerHTML = "";
        historyMeta.textContent = "总计 " + points.length + " 条记录，当前显示 " + filtered.length + " 条";

        if (!filtered.length) {
          var empty = document.createElement("li");
          empty.className = "empty";
          empty.textContent = "当前没有符合条件的记录。点击底部按钮开始记录你的第一个位置。";
          historyList.appendChild(empty);
          return;
        }

        var reversed = filtered.slice().reverse();
        reversed.forEach(function (p, index) {
          var li = document.createElement("li");
          li.className = "history-item";

          var t = document.createElement("time");
          t.textContent = formatDateTime(p.timestamp);

          var c = document.createElement("p");
          c.textContent = "#" + (filtered.length - index) + "  纬度: " + p.lat + "，经度: " + p.lng;

          li.appendChild(t);
          li.appendChild(c);
          historyList.appendChild(li);
        });
      }

      function adjustMap(filtered, focusLatest) {
        if (!filtered.length) {
          map.setView([25, 110], 4);
          return;
        }

        if (focusLatest) {
          var latest = filtered[filtered.length - 1];
          map.setView([latest.lat, latest.lng], 13, { animate: true });
          return;
        }

        if (filtered.length === 1) {
          map.setView([filtered[0].lat, filtered[0].lng], 13);
          return;
        }

        var bounds = L.latLngBounds(filtered.map(function (p) { return [p.lat, p.lng]; }));
        map.fitBounds(bounds, { padding: [42, 42], maxZoom: 14 });
      }

      function setStatus(text, isWarn) {
        statusText.textContent = text;
        statusText.classList.toggle("warn", Boolean(isWarn));
      }

      function resetRecordButton() {
        recordBtn.disabled = false;
        recordBtn.textContent = "记录我当前的位置";
      }

      function formatDateTime(ts) {
        return new Date(ts).toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        });
      }
    })();
  </script>
</body>
</html>
