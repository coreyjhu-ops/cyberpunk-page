<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>人生足迹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    :root {
      --bg-a: #f5f7ef;
      --bg-b: #e8efe1;
      --ink: #1f2d22;
      --accent: #2c7a5d;
      --accent-soft: #cfe7dc;
      --warn: #b15f33;
      --card: rgba(255, 255, 255, 0.92);
      --stroke: rgba(31, 45, 34, 0.16);
      --shadow: 0 16px 38px rgba(31, 45, 34, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Noto Sans SC", "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, #dcefd9 0%, transparent 30%),
        radial-gradient(circle at 90% 92%, #f1ddcb 0%, transparent 28%),
        linear-gradient(140deg, var(--bg-a), var(--bg-b));
      padding: calc(12px + env(safe-area-inset-top, 0px)) 12px calc(104px + env(safe-area-inset-bottom, 0px));
    }

    .shell {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .headline,
    .auth-card,
    .filters-card,
    .journey-card,
    .map-card,
    .history-card,
    .modal-panel,
    .journey-banner {
      border: 1px solid var(--stroke);
      border-radius: 14px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .headline {
      padding: 12px 16px;
      backdrop-filter: blur(4px);
    }

    h1 {
      font-size: clamp(1.2rem, 2.4vw, 1.8rem);
      font-family: "Manrope", sans-serif;
      letter-spacing: 0.02em;
    }

    .journey-banner {
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .journey-banner[hidden] {
      display: none;
    }

    .journey-banner span {
      font-size: 0.84rem;
      color: rgba(31, 45, 34, 0.88);
      font-weight: 700;
    }

    .workspace {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 320px;
      gap: 12px;
      align-items: start;
    }

    .left-panel {
      display: grid;
      gap: 12px;
    }

    .auth-card,
    .filters-card,
    .journey-card {
      padding: 12px;
    }

    .card-title {
      font-size: 0.95rem;
      font-family: "Manrope", sans-serif;
      margin-bottom: 8px;
    }

    .auth-form,
    .filters-form,
    .modal-form {
      display: grid;
      gap: 8px;
    }

    .auth-form input,
    .modal-form input {
      border: 1px solid var(--stroke);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font-size: 0.84rem;
      font-family: inherit;
      min-width: 0;
    }

    .auth-actions,
    .modal-actions,
    .journey-actions,
    .range-actions,
    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .auth-status,
    .auth-message,
    .modal-message,
    .journey-summary {
      margin-top: 8px;
      font-size: 0.82rem;
      line-height: 1.45;
      color: rgba(31, 45, 34, 0.8);
      word-break: break-word;
    }

    .journey-summary strong,
    .auth-status strong {
      color: #174232;
    }

    .auth-message.warn,
    .modal-message.warn {
      color: var(--warn);
    }

    .filters-form label,
    .modal-form label {
      font-size: 0.8rem;
      color: rgba(31, 45, 34, 0.75);
    }

    input[type="datetime-local"] {
      border: 1px solid var(--stroke);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font-size: 0.83rem;
      font-family: inherit;
      min-width: 0;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.84rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-main {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 18px rgba(44, 122, 93, 0.24);
    }

    .btn-danger {
      background: #9d3e26;
      color: #fff;
      box-shadow: 0 8px 18px rgba(157, 62, 38, 0.22);
    }

    .btn-plain {
      background: #fff;
      border-color: var(--stroke);
      color: var(--ink);
    }

    .btn-mini {
      padding: 5px 8px;
      font-size: 0.75rem;
      border-radius: 8px;
    }

    .mode-btn {
      background: var(--accent-soft);
      color: #174232;
    }

    .mode-btn.active {
      background: #174232;
      color: #fff;
    }

    .map-card {
      min-height: 460px;
    }

    #map {
      width: 100%;
      height: min(76vh, 760px);
      min-height: 460px;
    }

    .history-head {
      padding: 12px;
      border-bottom: 1px solid var(--stroke);
    }

    .history-head h2 {
      font-size: 1rem;
      font-family: "Manrope", sans-serif;
    }

    .history-head p {
      margin-top: 4px;
      font-size: 0.82rem;
      color: rgba(31, 45, 34, 0.7);
    }

    .history-list {
      list-style: none;
      max-height: min(76vh, 760px);
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--stroke);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.92);
    }

    .history-item time {
      font-size: 0.78rem;
      color: rgba(31, 45, 34, 0.7);
      display: block;
      margin-bottom: 4px;
    }

    .history-item .place {
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.35;
      color: #184534;
      margin-bottom: 2px;
    }

    .history-item .coord {
      font-size: 0.81rem;
      line-height: 1.35;
      color: rgba(31, 45, 34, 0.78);
    }

    .history-actions {
      margin-top: 6px;
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .empty {
      padding: 14px;
      border: 1px dashed var(--stroke);
      border-radius: 10px;
      font-size: 0.85rem;
      color: rgba(31, 45, 34, 0.65);
      background: rgba(255, 255, 255, 0.7);
    }

    .action-bar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      z-index: 600;
      padding: 10px;
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: rgba(251, 253, 249, 0.96);
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status {
      font-size: 0.84rem;
      color: rgba(31, 45, 34, 0.8);
    }

    .status.warn {
      color: var(--warn);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 32, 26, 0.32);
      z-index: 900;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal.open {
      display: flex;
    }

    .modal-panel {
      width: min(900px, 100%);
      padding: 14px;
      max-height: 88vh;
      overflow: auto;
    }

    .modal-head {
      font-size: 1rem;
      font-family: "Manrope", sans-serif;
      margin-bottom: 8px;
    }

    .modal-sub {
      font-size: 0.82rem;
      color: rgba(31, 45, 34, 0.78);
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .picker-list,
    .journeys-list,
    .journey-points-list {
      border: 1px solid var(--stroke);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.86);
      padding: 8px;
      max-height: 280px;
      overflow: auto;
      display: grid;
      gap: 6px;
    }

    .picker-item,
    .journey-point-row {
      border: 1px solid var(--stroke);
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
      font-size: 0.81rem;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
    }

    .picker-item label {
      display: flex;
      gap: 8px;
      width: 100%;
      cursor: pointer;
      align-items: flex-start;
      line-height: 1.35;
    }

    .journey-row {
      border: 1px solid var(--stroke);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      display: grid;
      gap: 8px;
    }

    .journey-row-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .journey-row-head strong {
      font-size: 0.88rem;
    }

    .journey-row-head span {
      font-size: 0.76rem;
      color: rgba(31, 45, 34, 0.72);
    }

    .journey-row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .track-arrow-icon {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      color: #8f4b29;
      font-weight: 700;
      font-size: 14px;
      transform-origin: center;
      text-shadow: 0 0 3px rgba(255, 255, 255, 0.85);
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .history-card {
        grid-column: 1 / span 2;
      }

      .history-list {
        max-height: 36vh;
      }
    }

    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .history-card {
        grid-column: auto;
      }

      #map {
        height: 58vh;
        min-height: 360px;
      }

      .history-list {
        max-height: 34vh;
      }
    }

    @media (max-width: 640px) {
      .auth-actions,
      .journey-actions,
      .modal-actions,
      .mode-row,
      .range-actions {
        grid-template-columns: 1fr;
      }

      .journey-row-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .action-bar {
        justify-content: flex-start;
      }

      .status {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="headline">
      <h1>人生足迹</h1>
    </header>

    <section id="journey-view-banner" class="journey-banner" hidden>
      <span id="journey-view-text">当前旅程：</span>
      <button id="exit-journey-view-btn" class="btn-plain" type="button">退出旅程视图</button>
    </section>

    <main class="workspace">
      <aside class="left-panel" aria-label="左侧控制区">
        <section class="auth-card" aria-label="登录区">
          <h2 class="card-title">账号登录</h2>
          <div class="auth-form">
            <input id="auth-email" type="email" placeholder="邮箱" autocomplete="email">
            <input id="auth-password" type="password" placeholder="密码（至少 6 位）" autocomplete="current-password">
            <div class="auth-actions">
              <button id="signin-btn" class="btn-main" type="button">登录</button>
              <button id="open-signup-btn" class="btn-plain" type="button">注册新账号</button>
              <button id="signout-btn" class="btn-danger" type="button" disabled>退出</button>
            </div>
          </div>
          <p id="auth-status" class="auth-status">登录状态：<strong>未登录</strong></p>
          <p id="auth-message" class="auth-message">提示：未登录时只能浏览空地图，登录后可读取并记录你的足迹。</p>
        </section>

        <section class="journey-card" aria-label="我的旅程">
          <h2 class="card-title">我的旅程</h2>
          <div class="journey-actions">
            <button id="open-create-journey-btn" class="btn-main" type="button" disabled>添加新的旅程</button>
            <button id="open-my-journeys-btn" class="btn-plain" type="button" disabled>我的旅程</button>
          </div>
          <p id="journey-summary" class="journey-summary">当前共有 <strong>0</strong> 个旅程</p>
        </section>

        <section class="filters-card" aria-label="筛选区">
          <h2 class="card-title">时间筛选与显示模式</h2>
          <div class="filters-form">
            <label for="start-time">起始时间</label>
            <input id="start-time" type="datetime-local">
            <label for="end-time">结束时间</label>
            <input id="end-time" type="datetime-local">
            <div class="range-actions">
              <button id="apply-filter" class="btn-plain" type="button">应用区间</button>
              <button id="clear-filter" class="btn-plain" type="button">清空区间</button>
            </div>
            <div class="mode-row">
              <button id="mode-all" class="mode-btn active" type="button">显示全部地点</button>
              <button id="mode-track" class="mode-btn" type="button">显示行迹轨迹</button>
            </div>
          </div>
        </section>
      </aside>

      <section class="map-card" aria-label="地图区域">
        <div id="map"></div>
      </section>

      <aside class="history-card" aria-label="历史记录">
        <div class="history-head">
          <h2>去过的地点历史</h2>
          <p id="history-meta">总计 0 条记录</p>
        </div>
        <ul id="history-list" class="history-list"></ul>
      </aside>
    </main>
  </div>

  <div class="action-bar">
    <div class="action-buttons">
      <button id="record-btn" class="btn-main" type="button" disabled>记录我当前的位置</button>
      <button id="undo-btn" class="btn-danger" type="button" disabled>撤回上一次记录</button>
    </div>
    <p id="status" class="status">请先登录</p>
  </div>

  <section id="signup-modal" class="modal" aria-label="注册弹窗" aria-hidden="true">
    <div class="modal-panel" style="max-width:460px;">
      <h3 class="modal-head">注册新账号</h3>
      <p class="modal-sub">请输入邮箱和两次一致的密码，创建账号后可直接登录使用。</p>
      <div class="modal-form">
        <input id="signup-email" type="email" placeholder="注册邮箱" autocomplete="email">
        <input id="signup-password" type="password" placeholder="输入密码（至少 6 位）" autocomplete="new-password">
        <input id="signup-password-confirm" type="password" placeholder="再次输入密码" autocomplete="new-password">
        <div class="modal-actions">
          <button id="signup-submit-btn" class="btn-main" type="button">确认注册</button>
          <button id="signup-cancel-btn" class="btn-plain" type="button">取消</button>
        </div>
      </div>
      <p id="signup-message" class="modal-message">注册成功后会自动尝试登录。</p>
    </div>
  </section>

  <section id="journey-editor-modal" class="modal" aria-label="旅程编辑弹窗" aria-hidden="true">
    <div class="modal-panel">
      <h3 id="journey-editor-title" class="modal-head">添加新的旅程</h3>
      <p id="journey-editor-sub" class="modal-sub">选择地点并保存到旅程，地点顺序按到达时间自动排序。</p>
      <div class="modal-form">
        <div id="journey-name-wrap">
          <label for="journey-name-input">旅程名称</label>
          <input id="journey-name-input" type="text" placeholder="例如：华盛顿周末" maxlength="80">
        </div>
        <label for="journey-editor-start">筛选起始时间</label>
        <input id="journey-editor-start" type="datetime-local">
        <label for="journey-editor-end">筛选结束时间</label>
        <input id="journey-editor-end" type="datetime-local">
        <div class="range-actions">
          <button id="journey-editor-apply-filter-btn" class="btn-plain" type="button">应用筛选</button>
          <button id="journey-editor-clear-filter-btn" class="btn-plain" type="button">清空筛选</button>
        </div>
        <div id="journey-editor-point-list" class="picker-list"></div>
        <div class="modal-actions">
          <button id="journey-editor-save-btn" class="btn-main" type="button">保存</button>
          <button id="journey-editor-cancel-btn" class="btn-plain" type="button">取消</button>
        </div>
      </div>
      <p id="journey-editor-message" class="modal-message">请选择要加入旅程的地点。</p>
    </div>
  </section>

  <section id="journeys-modal" class="modal" aria-label="我的旅程弹窗" aria-hidden="true">
    <div class="modal-panel">
      <h3 class="modal-head">我的旅程</h3>
      <p class="modal-sub">在此管理旅程：显示路径、添加地点、重命名、删除、移除地点。</p>
      <div id="journeys-modal-list" class="journeys-list"></div>
      <div class="modal-actions" style="margin-top:10px;">
        <button id="journeys-modal-close-btn" class="btn-plain" type="button">关闭</button>
      </div>
      <p id="journeys-modal-message" class="modal-message"></p>
    </div>
  </section>

  <script

    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

      function bindAuthListener() {
        supabaseClient.auth.onAuthStateChange(function (_event, session) {
          currentUser = session ? session.user : null;
          setAuthStatus();

          if (currentUser) {
            syncAllData()
              .then(function () {
                setStatus("已登录并同步你的记录", false);
              })
              .catch(function (error) {
                setStatus("读取云端数据失败：" + toErrorMessage(error), true);
              })
              .finally(function () {
                updateActionButtons();
              });
          } else {
            points = [];
            journeys = [];
            journeyPointMap = {};
            activeJourneyView = null;
            renderJourneySummary();
            renderJourneyBanner();
            renderJourneysModalList();
            render(false);
            updateActionButtons();
          }
        });
      }

      async function initializeSession() {
        setBusy(true, "检查登录状态...");
        try {
          var sessionResult = await supabaseClient.auth.getSession();
          if (sessionResult.error) {
            throw sessionResult.error;
          }

          currentUser = sessionResult.data.session ? sessionResult.data.session.user : null;
          setAuthStatus();

          if (currentUser) {
            await syncAllData();
            setStatus("已恢复登录状态，并同步云端记录", false);
          } else {
            setStatus("请先登录后记录位置", false);
          }
        } catch (error) {
          setStatus("会话初始化失败：" + toErrorMessage(error), true);
          setAuthMessage("会话初始化失败：" + toErrorMessage(error), true);
        } finally {
          setBusy(false);
        }
      }

      async function syncAllData() {
        await fetchPointsFromDb();
        await fetchJourneysFromDb();
        ensureActiveJourneyValid();
        hydrateMissingPlaceNames(points);
        renderJourneySummary();
        renderJourneyBanner();
        renderJourneysModalList();
        render(false);
      }

      function openSignupModal() {
        signupEmailInput.value = authEmailInput.value.trim();

        signupModal.classList.add("open");
        signupModal.setAttribute("aria-hidden", "false");
      }

      function closeSignupModal() {

        signupModal.setAttribute("aria-hidden", "true");

      async function signUpFromModal() {
        if (isBusy) return;

        var email = signupEmailInput.value.trim();
        var password = signupPasswordInput.value;
        var confirm = signupPasswordConfirmInput.value;

        if (!email || !password || !confirm) {
          setSignupMessage("请完整填写邮箱和两次密码", true);
          return;
        }

        if (password.length < 6) {
          setSignupMessage("密码至少 6 位", true);
          return;
        }

        if (password !== confirm) {
          setSignupMessage("两次密码不一致，请重新输入", true);
          return;
        }

        setBusy(true, "注册中...");
        setSignupMessage("正在注册，请稍候...", false);

        try {
          var signUpResult = await supabaseClient.auth.signUp({
            email: email,
            password: password
          });

          if (signUpResult.error) {
            throw signUpResult.error;
          }

          if (signUpResult.data && signUpResult.data.session) {
            authEmailInput.value = email;
            authPasswordInput.value = password;
            closeSignupModal();
            setStatus("注册并登录成功", false);
            setAuthMessage("注册并登录成功", false);
            return;
          }

          var loginResult = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (loginResult.error) {
            setSignupMessage("注册成功，但自动登录失败，请直接在登录区登录。", true);
            setStatus("注册成功，但尚未登录", true);
            return;
          }

          authEmailInput.value = email;
          authPasswordInput.value = password;
          closeSignupModal();
          setStatus("注册并登录成功", false);
          setAuthMessage("注册并登录成功", false);
        } catch (error) {
          var msg = toErrorMessage(error);
          setSignupMessage("注册失败：" + msg, true);
          setStatus("注册失败：" + msg, true);
        } finally {
          setBusy(false);
        }
      }

      async function signIn() {
        var email = authEmailInput.value.trim();
        var password = authPasswordInput.value;

        if (!email || !password) {
          setStatus("请输入邮箱和密码", true);
          setAuthMessage("请输入邮箱和密码", true);
          return;
        }

        if (password.length < 6) {
          setStatus("密码至少 6 位", true);
          setAuthMessage("密码至少 6 位", true);
          return;
        }

        setBusy(true, "登录中...");
        setAuthMessage("正在登录，请稍候...", false);

        try {
          var result = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (result.error) {
            throw result.error;
          }

          setStatus("登录成功", false);
          setAuthMessage("登录成功", false);
        } catch (error) {
          var msg = toErrorMessage(error);
          setStatus("登录失败：" + msg, true);
          setAuthMessage("登录失败：" + msg, true);
        } finally {
          setBusy(false);

      async function fetchPointsFromDb() {
        if (!currentUser) {
          points = [];
          return;
        }

        var rows = [];

        if (dbHasPlaceColumn) {
          var withPlace = await supabaseClient
            .from("travel_points")
            .select("id, lat, lng, visited_at, place_name")
            .eq("user_id", currentUser.id)
            .order("visited_at", { ascending: true });

          if (withPlace.error) {
            if (isMissingPlaceColumnError(withPlace.error)) {
              dbHasPlaceColumn = false;
              warnPlaceColumnMissing();
            } else {
              throw withPlace.error;
            }
          } else {
            rows = withPlace.data || [];
          }
        }

        if (!dbHasPlaceColumn) {
          var withoutPlace = await supabaseClient
            .from("travel_points")
            .select("id, lat, lng, visited_at")
            .eq("user_id", currentUser.id)
            .order("visited_at", { ascending: true });

          if (withoutPlace.error) {
            throw withoutPlace.error;
          }
          rows = withoutPlace.data || [];
        }

        points = rows.map(function (row) {
          return {
            id: row.id,
            lat: Number(row.lat),
            lng: Number(row.lng),
            timestamp: new Date(row.visited_at).getTime(),
            placeName: row.place_name || ""
          };
        });
      }

      async function fetchJourneysFromDb() {
        if (!currentUser) {
          journeys = [];
          journeyPointMap = {};
          return;
        }

        var journeyRows = await supabaseClient
          .from("travel_journeys")
          .select("id, user_id, name, created_at, updated_at")
          .eq("user_id", currentUser.id)
          .order("created_at", { ascending: false });

        if (journeyRows.error) {
          handleJourneyDbError(journeyRows.error);
          journeys = [];
          journeyPointMap = {};
          return;
        }

        var linkRows = await supabaseClient
          .from("travel_journey_points")
          .select("journey_id, point_id, user_id")
          .eq("user_id", currentUser.id);

        if (linkRows.error) {
          handleJourneyDbError(linkRows.error);
          journeys = journeyRows.data || [];
          journeyPointMap = {};
          return;
        }

        journeys = (journeyRows.data || []).map(function (row) {
          return {
            id: row.id,
            userId: row.user_id,
            name: row.name,
            createdAt: row.created_at,
            updatedAt: row.updated_at
          };
        });

        var mapObj = {};
        (linkRows.data || []).forEach(function (row) {
          if (!mapObj[row.journey_id]) {
            mapObj[row.journey_id] = [];
          }
          if (mapObj[row.journey_id].indexOf(row.point_id) === -1) {
            mapObj[row.journey_id].push(row.point_id);
          }
        });

        journeyPointMap = mapObj;
      }

      async function createJourney(name, pointIds) {
        var insertJourney = await supabaseClient
          .from("travel_journeys")
          .insert({ user_id: currentUser.id, name: name })
          .select("id")
          .single();

        if (insertJourney.error) {
          handleJourneyDbError(insertJourney.error);
          throw insertJourney.error;
        }

        var journeyId = insertJourney.data.id;

        if (pointIds && pointIds.length) {
          await addPointsToJourney(journeyId, pointIds);
        }

        return journeyId;
      }

      async function renameJourney(journeyId, newName) {
        var result = await supabaseClient
          .from("travel_journeys")
          .update({ name: newName, updated_at: new Date().toISOString() })
          .eq("id", journeyId)
          .eq("user_id", currentUser.id);

        if (result.error) {
          handleJourneyDbError(result.error);
          throw result.error;
        }
      }

      async function deleteJourney(journeyId) {
        var result = await supabaseClient
          .from("travel_journeys")
          .delete()
          .eq("id", journeyId)
          .eq("user_id", currentUser.id);

        if (result.error) {
          handleJourneyDbError(result.error);
          throw result.error;
        }
      }

      async function addPointsToJourney(journeyId, pointIds) {
        if (!pointIds || !pointIds.length) return;

        var rows = pointIds.map(function (pointId) {
          return {
            journey_id: journeyId,
            point_id: pointId,
            user_id: currentUser.id
          };
        });

        var result = await supabaseClient
          .from("travel_journey_points")
          .upsert(rows, { onConflict: "journey_id,point_id", ignoreDuplicates: true });

        if (result.error) {
          handleJourneyDbError(result.error);
          throw result.error;
        }
      }

      async function removePointFromJourney(journeyId, pointId) {
        var result = await supabaseClient
          .from("travel_journey_points")
          .delete()
          .eq("journey_id", journeyId)
          .eq("point_id", pointId)
          .eq("user_id", currentUser.id);

        if (result.error) {
          handleJourneyDbError(result.error);
          throw result.error;
        }
      }

          setStatus("请先登录", true);
          return;
        }

        journeyEditorState.mode = mode;
        journeyEditorState.targetJourneyId = journeyId;
        journeyEditorState.selectedPointIds = {};
        journeyEditorState.start = "";
        journeyEditorState.end = "";

        journeyEditorStart.value = "";
        journeyEditorEnd.value = "";

        if (mode === "create") {
          journeyEditorTitle.textContent = "添加新的旅程";
          journeyEditorSub.textContent = "输入旅程名并选择地点，路径将按到达时间自动排序。";
          journeyNameWrap.hidden = false;
          journeyNameInput.value = "";
          journeyEditorSaveBtn.textContent = "创建旅程";
        } else {
          var target = findJourneyById(journeyId);
          journeyEditorTitle.textContent = "添加地点到旅程";
          journeyEditorSub.textContent = target ? ("旅程：" + target.name) : "请选择地点";
          journeyNameWrap.hidden = true;
          journeyEditorSaveBtn.textContent = "添加地点";

        setJourneyEditorMessage("请选择地点。", false);
        renderJourneyEditorPointList();
        journeyEditorModal.classList.add("open");
        journeyEditorModal.setAttribute("aria-hidden", "false");
      }

      function closeJourneyEditor() {
        journeyEditorModal.classList.remove("open");
        journeyEditorModal.setAttribute("aria-hidden", "true");
      }

      function openJourneysModal() {
        if (!currentUser) {
          setStatus("请先登录", true);
          return;
        }

        renderJourneysModalList();
        setJourneysModalMessage("", false);
        journeysModal.classList.add("open");
        journeysModal.setAttribute("aria-hidden", "false");
      }

      function closeJourneysModal() {
        journeysModal.classList.remove("open");
        journeysModal.setAttribute("aria-hidden", "true");
      }

      function getJourneyEditorCandidatePoints() {
        var start = journeyEditorState.start ? new Date(journeyEditorState.start).getTime() : null;
        var end = journeyEditorState.end ? new Date(journeyEditorState.end).getTime() : null;

        return points.filter(function (p) {
          var okStart = start === null || p.timestamp >= start;
          var okEnd = end === null || p.timestamp <= end;
          return okStart && okEnd;
        }).sort(function (a, b) {
          return b.timestamp - a.timestamp;
        });
      }

      function renderJourneyEditorPointList() {
        journeyEditorPointList.innerHTML = "";

        var candidates = getJourneyEditorCandidatePoints();
        if (!candidates.length) {
          var empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "当前筛选条件下没有可选地点。";
          journeyEditorPointList.appendChild(empty);
          return;
        }

        var existingMap = {};
        if (journeyEditorState.mode === "add" && journeyEditorState.targetJourneyId) {
          (journeyPointMap[journeyEditorState.targetJourneyId] || []).forEach(function (id) {
            existingMap[id] = true;
          });
        }

        candidates.forEach(function (point) {
          var row = document.createElement("div");
          row.className = "picker-item";

          var label = document.createElement("label");
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = Boolean(journeyEditorState.selectedPointIds[point.id]);

          if (existingMap[point.id]) {
            cb.disabled = true;
          }

          cb.addEventListener("change", function () {
            if (cb.checked) {
              journeyEditorState.selectedPointIds[point.id] = true;
            } else {
              delete journeyEditorState.selectedPointIds[point.id];
            }
          });

          var text = document.createElement("span");
          text.textContent =
            (point.placeName || "地点解析中...") +
            " | " +
            formatDateTime(point.timestamp) +
            " | 纬度 " +
            point.lat +
            " 经度 " +
            point.lng +
            (existingMap[point.id] ? "（已在该旅程中）" : "");

          label.appendChild(cb);
          label.appendChild(text);
          row.appendChild(label);
          journeyEditorPointList.appendChild(row);
        });
      }

      async function saveJourneyEditor() {
        if (!currentUser) {
          setJourneyEditorMessage("请先登录", true);
          return;
        }

        var selectedIds = Object.keys(journeyEditorState.selectedPointIds);

        if (journeyEditorState.mode === "create") {
          var journeyName = journeyNameInput.value.trim();
          if (!journeyName) {
            setJourneyEditorMessage("请输入旅程名称", true);
            return;
          }

          setBusy(true, "创建旅程中...");
          try {
            await createJourney(journeyName, selectedIds);
            await fetchJourneysFromDb();
            ensureActiveJourneyValid();
            renderJourneySummary();
            renderJourneyBanner();
            renderJourneysModalList();
            render(false);
            closeJourneyEditor();
            setStatus("旅程已创建", false);
          } catch (error) {
            setJourneyEditorMessage("创建失败：" + toErrorMessage(error), true);
          } finally {
            setBusy(false);
          }
        } else {
          if (!journeyEditorState.targetJourneyId) {
            setJourneyEditorMessage("未选中目标旅程", true);
            return;
          }

          if (!selectedIds.length) {
            setJourneyEditorMessage("请至少选择一个地点", true);
            return;
          }

          setBusy(true, "添加地点中...");
          try {
            await addPointsToJourney(journeyEditorState.targetJourneyId, selectedIds);
            await fetchJourneysFromDb();
            ensureActiveJourneyValid();
            renderJourneySummary();
            renderJourneyBanner();
            renderJourneysModalList();
            render(false);
            closeJourneyEditor();
            setStatus("地点已加入旅程", false);
          } catch (error) {
            setJourneyEditorMessage("添加失败：" + toErrorMessage(error), true);
          } finally {
            setBusy(false);
          }
        }
      }

      function renderJourneysModalList() {
        journeysModalList.innerHTML = "";

        if (!currentUser) {
          var notLogin = document.createElement("div");
          notLogin.className = "empty";
          notLogin.textContent = "请先登录后管理旅程。";
          journeysModalList.appendChild(notLogin);
          return;
        }

        if (!journeys.length) {
          var empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "还没有旅程。点击“添加新的旅程”开始创建。";
          journeysModalList.appendChild(empty);
          return;
        }

        journeys.forEach(function (journey) {
          var row = document.createElement("div");
          row.className = "journey-row";

          var head = document.createElement("div");
          head.className = "journey-row-head";

          var nameWrap = document.createElement("div");
          var strong = document.createElement("strong");
          strong.textContent = journey.name;
          var meta = document.createElement("span");
          var count = (journeyPointMap[journey.id] || []).length;
          meta.textContent = "地点数：" + count;
          nameWrap.appendChild(strong);
          nameWrap.appendChild(meta);

          var actions = document.createElement("div");
          actions.className = "journey-row-actions";

          var showBtn = document.createElement("button");
          showBtn.className = "btn-main btn-mini";
          showBtn.type = "button";
          showBtn.textContent = "显示该旅程";
          showBtn.addEventListener("click", function () {
            activateJourneyView(journey.id);
            closeJourneysModal();
          });

          var addBtn = document.createElement("button");
          addBtn.className = "btn-plain btn-mini";
          addBtn.type = "button";
          addBtn.textContent = "添加地点";
          addBtn.addEventListener("click", function () {
            closeJourneysModal();
            openJourneyEditor("add", journey.id);
          });

          var renameBtn = document.createElement("button");
          renameBtn.className = "btn-plain btn-mini";
          renameBtn.type = "button";
          renameBtn.textContent = "重命名";
          renameBtn.addEventListener("click", function () {
            renameJourneyFromUser(journey.id, journey.name);
          });

          var delBtn = document.createElement("button");
          delBtn.className = "btn-danger btn-mini";
          delBtn.type = "button";
          delBtn.textContent = "删除";
          delBtn.addEventListener("click", function () {
            deleteJourneyFromUser(journey.id, journey.name);
          });

          actions.appendChild(showBtn);
          actions.appendChild(addBtn);
          actions.appendChild(renameBtn);
          actions.appendChild(delBtn);

          head.appendChild(nameWrap);
          head.appendChild(actions);

          var pointsWrap = document.createElement("div");
          pointsWrap.className = "journey-points-list";
          var pointList = getJourneyPoints(journey.id);

          if (!pointList.length) {
            var none = document.createElement("div");
            none.className = "empty";
            none.textContent = "该旅程暂无地点";
            pointsWrap.appendChild(none);
          } else {
            pointList.forEach(function (p) {
              var pRow = document.createElement("div");
              pRow.className = "journey-point-row";

              var pText = document.createElement("span");
              pText.textContent = (p.placeName || "地点解析中...") + " | " + formatDateTime(p.timestamp);

              var removeBtn = document.createElement("button");
              removeBtn.className = "btn-plain btn-mini";
              removeBtn.type = "button";

      function activateJourneyView(journeyId) {

          return;

      function ensureActiveJourneyValid() {
        if (!activeJourneyView) return;
        var target = findJourneyById(activeJourneyView.journeyId);
        if (!target) {
          activeJourneyView = null;
          return;
        }
        activeJourneyView.journeyName = target.name;
      }

      function findJourneyById(journeyId) {
        for (var i = 0; i < journeys.length; i += 1) {
          if (journeys[i].id === journeyId) return journeys[i];
        }
        return null;
      }

      function getJourneyPoints(journeyId) {
        var pointIds = journeyPointMap[journeyId] || [];
        var idMap = {};
        pointIds.forEach(function (id) {
          idMap[id] = true;
        });

        return points.filter(function (p) {
          return idMap[p.id];
        }).sort(function (a, b) {
          return a.timestamp - b.timestamp;
        });
      }

      async function addCurrentLocation() {
        if (!currentUser) {
          setStatus("请先登录", true);
          return;
        }

        if (!navigator.geolocation) {
          setStatus("当前浏览器不支持地理定位", true);
          return;
        }

        setBusy(true, "定位中...");

        navigator.geolocation.getCurrentPosition(
          async function (pos) {
            try {
              var lat = Number(pos.coords.latitude.toFixed(6));
              var lng = Number(pos.coords.longitude.toFixed(6));
              var visitedAt = new Date().toISOString();
              var placeName = await resolvePlaceName(lat, lng);

              var payload = {
                user_id: currentUser.id,
                lat: lat,
                lng: lng,
                visited_at: visitedAt
              };

              if (dbHasPlaceColumn && placeName) {
                payload.place_name = placeName;
              }

              var result = await supabaseClient
                .from("travel_points")
                .insert(payload)
                .select(dbHasPlaceColumn ? "id, lat, lng, visited_at, place_name" : "id, lat, lng, visited_at")
                .single();

              if (result.error && isMissingPlaceColumnError(result.error)) {
                dbHasPlaceColumn = false;
                warnPlaceColumnMissing();
                delete payload.place_name;
                result = await supabaseClient
                  .from("travel_points")
                  .insert(payload)
                  .select("id, lat, lng, visited_at")
                  .single();
              }

              if (result.error) {
                throw result.error;
              }

              points.push({
                id: result.data.id,
                lat: Number(result.data.lat),
                lng: Number(result.data.lng),
                timestamp: new Date(result.data.visited_at).getTime(),
                placeName: result.data.place_name || placeName || ""
              });
              points.sort(function (a, b) { return a.timestamp - b.timestamp; });

              renderJourneysModalList();
              render(true);
              updateActionButtons();
              setStatus("已记录：" + (placeName || "新地点"), false);
            } catch (error) {
              setStatus("保存失败：" + toErrorMessage(error), true);
            } finally {
              setBusy(false);
            }
          },
          function (error) {
            var message = "定位失败";
            if (error.code === 1) message = "定位失败：你拒绝了定位权限";
            if (error.code === 2) message = "定位失败：位置信息不可用";
            if (error.code === 3) message = "定位失败：获取定位超时";
            setStatus(message, true);
            setBusy(false);
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      }

      async function undoLastRecord() {
        if (!currentUser) {
          setStatus("请先登录", true);
          return;
        }

        if (!points.length) {
          setStatus("没有可撤回的记录", true);
          return;
        }

        var latest = points[points.length - 1];
        setBusy(true, "撤回中...");

        try {
          var result = await supabaseClient
            .from("travel_points")
            .delete()
            .eq("id", latest.id)
            .eq("user_id", currentUser.id);

          if (result.error) {
            throw result.error;
          }

          points = points.filter(function (p) {
            return p.id !== latest.id;
          });

          if (activeJourneyView) {
            await fetchJourneysFromDb();
            ensureActiveJourneyValid();
            renderJourneySummary();
            renderJourneyBanner();
            renderJourneysModalList();
          }

          render(false);
          updateActionButtons();
          setStatus("已撤回最后一条记录：" + (latest.placeName || formatDateTime(latest.timestamp)), false);
        } catch (error) {
          setStatus("撤回失败：" + toErrorMessage(error), true);
        } finally {
          setBusy(false);
        }
      }

      function hydrateMissingPlaceNames(items) {
        items.forEach(function (point) {
          if (point.placeName || pointResolveInFlight[point.id]) return;

          pointResolveInFlight[point.id] = true;
          resolvePlaceName(point.lat, point.lng)
            .then(function (name) {
              if (!name) return;
              point.placeName = name;
              renderJourneysModalList();
              render(false);
              if (dbHasPlaceColumn && currentUser) {
                persistPointPlaceName(point);
              }
            })
            .catch(function () {
            })
            .finally(function () {
              delete pointResolveInFlight[point.id];
            });
        });
      }

      async function persistPointPlaceName(point) {
        var result = await supabaseClient
          .from("travel_points")
          .update({ place_name: point.placeName })
          .eq("id", point.id)
          .eq("user_id", currentUser.id);

        if (result.error && isMissingPlaceColumnError(result.error)) {
          dbHasPlaceColumn = false;
          warnPlaceColumnMissing();
          return;
        }

        if (result.error && isUpdatePolicyError(result.error)) {
          warnUpdatePolicyMissing();
        }
      }

      async function renamePointFromUser(pointId, currentName) {
        if (!currentUser) {
          setStatus("请先登录", true);
          return;
        }

        var nextName = window.prompt("请输入新的地点名：", currentName || "");
        if (nextName === null) return;
        nextName = nextName.trim();

        if (!nextName) {
          setStatus("地点名不能为空", true);
          return;
        }

        var target = null;
        for (var i = 0; i < points.length; i += 1) {
          if (points[i].id === pointId) {
            target = points[i];
            break;
          }
        }

        if (!target) {
          setStatus("未找到目标记录，请刷新后重试", true);
          return;
        }

        if (!dbHasPlaceColumn) {
          warnPlaceColumnMissing();
          return;
        }

        setBusy(true, "保存地点名中...");
        try {
          var result = await supabaseClient
            .from("travel_points")
            .update({ place_name: nextName })
            .eq("id", pointId)
            .eq("user_id", currentUser.id);

          if (result.error) {
            if (isMissingPlaceColumnError(result.error)) {
              dbHasPlaceColumn = false;
              warnPlaceColumnMissing();
              return;
            }
            if (isUpdatePolicyError(result.error)) {
              warnUpdatePolicyMissing();
              return;
            }
            throw result.error;
          }

          target.placeName = nextName;
          placeCache[target.lat.toFixed(5) + "," + target.lng.toFixed(5)] = nextName;
          savePlaceCache(placeCache);
          renderJourneysModalList();
          render(false);
          setStatus("地点名已更新", false);
        } catch (error) {
          setStatus("地点名更新失败：" + toErrorMessage(error), true);
        } finally {
          setBusy(false);
        }
      }

      async function resolvePlaceName(lat, lng) {
        var key = lat.toFixed(5) + "," + lng.toFixed(5);
        if (placeCache[key]) {
          return placeCache[key];
        }

        if (placeLookupInFlight[key]) {
          return placeLookupInFlight[key];
        }

        placeLookupInFlight[key] = fetch(
          "https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=" +
          encodeURIComponent(lat) +
          "&lon=" +
          encodeURIComponent(lng) +
          "&zoom=18&addressdetails=1",
          {
            headers: {
              "Accept-Language": "zh-CN,en;q=0.8"
            }
          }
        )
          .then(function (resp) {
            if (!resp.ok) return null;
            return resp.json();
          })
          .then(function (data) {
            var name = extractPlaceName(data);
            if (name) {
              placeCache[key] = name;
              savePlaceCache(placeCache);
            }
            return name || "";
          })
          .catch(function () {
            return "";
          })
          .finally(function () {
            delete placeLookupInFlight[key];
          });

        return placeLookupInFlight[key];
      }

      function extractPlaceName(data) {
        if (!data) return "";
        if (typeof data.name === "string" && data.name.trim()) {
          return data.name.trim();
        }

        var address = data.address || {};
        var keys = [
          "attraction",
          "building",
          "amenity",
          "shop",
          "office",
          "tourism",
          "leisure",
          "road",
          "neighbourhood",
          "suburb",
          "city",
          "town",
          "state"
        ];

        for (var i = 0; i < keys.length; i += 1) {
          var v = address[keys[i]];
          if (typeof v === "string" && v.trim()) {
            return v.trim();
          }
        }

        if (typeof data.display_name === "string" && data.display_name.trim()) {
          return data.display_name.split(",")[0].trim();
        }

        return "";
      }

      function loadPlaceCache() {
        try {
          var raw = localStorage.getItem(PLACE_CACHE_KEY);
          if (!raw) return {};
          var parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return {};
          return parsed;
        } catch (_e) {
          return {};
        }
      }

      function savePlaceCache(cache) {
        try {
          localStorage.setItem(PLACE_CACHE_KEY, JSON.stringify(cache));
        } catch (_e) {
        }
      }

      function handleJourneyDbError(error) {
        if (isJourneyTableMissingError(error)) {
          warnJourneyTablesMissing();
          return;
        }
        if (isJourneyPolicyError(error)) {
          warnJourneyPolicyMissing();
          return;
        }
      }

      function warnPlaceColumnMissing() {
        if (placeColumnWarned) return;
        placeColumnWarned = true;
        setStatus("数据库缺少 place_name 列，无法持久化地点名。请执行：alter table public.travel_points add column if not exists place_name text;", true);
      }

      function warnUpdatePolicyMissing() {
        if (updatePolicyWarned) return;
        updatePolicyWarned = true;
        setStatus("数据库缺少 update 权限策略，无法修改地点名。请执行：create policy \"Users can update own points\" on public.travel_points for update to authenticated using ((select auth.uid()) = user_id) with check ((select auth.uid()) = user_id);", true);
      }

      function warnJourneyTablesMissing() {
        if (journeyTableWarned) return;
        journeyTableWarned = true;
        setStatus("未检测到 v1.1 旅程数据表，请先在 Supabase 执行 v1.1 SQL 迁移。", true);
      }

      function warnJourneyPolicyMissing() {
        if (journeyPolicyWarned) return;
        journeyPolicyWarned = true;
        setStatus("旅程表 RLS 策略缺失或权限不足，请执行文档中的 v1.1 RLS SQL。", true);
      }

      function isMissingPlaceColumnError(error) {
        var msg = toErrorMessage(error).toLowerCase();
        return msg.indexOf("place_name") !== -1 && msg.indexOf("does not exist") !== -1;
      }

      function isUpdatePolicyError(error) {
        var msg = toErrorMessage(error).toLowerCase();
        return msg.indexOf("permission denied") !== -1 || msg.indexOf("row-level security") !== -1;
      }

      function isJourneyTableMissingError(error) {
        var msg = toErrorMessage(error).toLowerCase();
        var missing = msg.indexOf("does not exist") !== -1;
        return missing && (
          msg.indexOf("travel_journeys") !== -1 ||
          msg.indexOf("travel_journey_points") !== -1
        );
      }

      function isJourneyPolicyError(error) {
        var msg = toErrorMessage(error).toLowerCase();
        return msg.indexOf("row-level security") !== -1 || msg.indexOf("permission denied") !== -1;
      }

      function getFilteredPoints() {
        var start = startInput.value ? new Date(startInput.value).getTime() : null;
        var end = endInput.value ? new Date(endInput.value).getTime() : null;

        return points.filter(function (p) {
          var okStart = start === null || p.timestamp >= start;
          var okEnd = end === null || p.timestamp <= end;
          return okStart && okEnd;
        });
      }

      function getDisplayPoints() {
        if (!activeJourneyView) {
          return getFilteredPoints();
        }

        return getJourneyPoints(activeJourneyView.journeyId);
      }

      function render(focusLatest) {
        var displayPoints = getDisplayPoints();
        markerLayer.clearLayers();
        trackLayer.clearLayers();

        if (currentMode === "all") {
          displayPoints.forEach(function (p, idx) {
            L.circleMarker([p.lat, p.lng], {
              radius: 7,
              color: "#1f5e48",
              fillColor: "#2c7a5d",
              fillOpacity: 0.88,
              weight: 2
            })
              .bindPopup(
                "第 " +
                (idx + 1) +
                " 个点<br>" +
                (p.placeName || "地点解析中...") +
                "<br>" +
                formatDateTime(p.timestamp) +
                "<br>" +
                p.lat +
                ", " +
                p.lng
              )
              .addTo(markerLayer);
          });
        } else {
          var latLngs = displayPoints.map(function (p) {
            return [p.lat, p.lng];
          });

          if (latLngs.length > 1) {
            L.polyline(latLngs, {
              color: "#b15f33",
              weight: 4,
              opacity: 0.9,
              lineJoin: "round"
            }).addTo(trackLayer);
            drawTrackArrows(latLngs);
          }

          displayPoints.forEach(function (p, idx) {
            L.circleMarker([p.lat, p.lng], {
              radius: 6,
              color: "#8f4b29",
              fillColor: "#d98153",
              fillOpacity: 0.95,
              weight: 2
            })
              .bindPopup(
                "轨迹点 " +
                (idx + 1) +
                "<br>" +
                (p.placeName || "地点解析中...") +
                "<br>" +
                formatDateTime(p.timestamp) +
                "<br>" +
                p.lat +
                ", " +
                p.lng
              )
              .addTo(trackLayer);
          });
        }

        renderHistory(displayPoints);
        adjustMap(displayPoints, focusLatest);
      }

      function renderHistory(displayPoints) {
        historyList.innerHTML = "";

        if (activeJourneyView) {
          var jname = activeJourneyView.journeyName || "未命名旅程";
          historyMeta.textContent = "当前旅程：" + jname + "，共 " + displayPoints.length + " 个地点";
        } else {
          historyMeta.textContent = "总计 " + points.length + " 条记录，当前显示 " + displayPoints.length + " 条";
        }

        if (!displayPoints.length) {
          var empty = document.createElement("li");
          empty.className = "empty";
          if (!currentUser) {
            empty.textContent = "请先登录后查看和记录你自己的足迹。";
          } else if (activeJourneyView) {
            empty.textContent = "该旅程暂无地点。";
          } else {
            empty.textContent = "当前没有符合条件的记录。点击底部按钮开始记录。";
          }
          historyList.appendChild(empty);
          return;
        }

        var reversed = displayPoints.slice().reverse();
        reversed.forEach(function (p, index) {
          var li = document.createElement("li");
          li.className = "history-item";

          var t = document.createElement("time");
          t.textContent = formatDateTime(p.timestamp);

          var place = document.createElement("p");
          place.className = "place";
          place.textContent = "#" + (displayPoints.length - index) + "  " + (p.placeName || "地点解析中...");

          var coord = document.createElement("p");
          coord.className = "coord";
          coord.textContent = "纬度: " + p.lat + "，经度: " + p.lng;

          var actions = document.createElement("div");
          actions.className = "history-actions";

          var renameBtn = document.createElement("button");
          renameBtn.className = "btn-plain btn-mini";
          renameBtn.type = "button";
          renameBtn.textContent = "修改地点名";
          renameBtn.addEventListener("click", function () {
            renamePointFromUser(p.id, p.placeName || "");
          });
          actions.appendChild(renameBtn);

          if (activeJourneyView) {
            var removeJourneyBtn = document.createElement("button");
            removeJourneyBtn.className = "btn-plain btn-mini";
            removeJourneyBtn.type = "button";
            removeJourneyBtn.textContent = "从旅程移除";
            removeJourneyBtn.addEventListener("click", function () {
              removePointFromJourneyFromUser(activeJourneyView.journeyId, p.id);
            });
            actions.appendChild(removeJourneyBtn);
          }

          li.appendChild(t);
          li.appendChild(place);
          li.appendChild(coord);
          li.appendChild(actions);
          historyList.appendChild(li);
        });
      }

      function adjustMap(displayPoints, focusLatest) {
        if (!displayPoints.length) {
          map.setView([25, 110], 4);
          return;
        }

        if (focusLatest) {
          var latest = displayPoints[displayPoints.length - 1];
          map.setView([latest.lat, latest.lng], 13, { animate: true });
          return;
        }

        if (displayPoints.length === 1) {
          map.setView([displayPoints[0].lat, displayPoints[0].lng], 13);
          return;
        }

        var bounds = L.latLngBounds(displayPoints.map(function (p) { return [p.lat, p.lng]; }));
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
      }

      function drawTrackArrows(latLngs) {
        for (var i = 0; i < latLngs.length - 1; i += 1) {
          var from = latLngs[i];
          var to = latLngs[i + 1];
          var mid = [(from[0] + to[0]) / 2, (from[1] + to[1]) / 2];
          var angle = computeBearingDeg(from, to);

          L.marker(mid, {
            icon: L.divIcon({
              className: "",
              html: '<div class="track-arrow-icon" style="transform: rotate(' + (angle - 90).toFixed(1) + 'deg);">➤</div>',
              iconSize: [18, 18],
              iconAnchor: [9, 9]
            }),
            keyboard: false,
            interactive: false
          }).addTo(trackLayer);
        }
      }

      function computeBearingDeg(from, to) {
        var lat1 = from[0] * Math.PI / 180;
        var lat2 = to[0] * Math.PI / 180;
        var dLon = (to[1] - from[1]) * Math.PI / 180;
        var y = Math.sin(dLon) * Math.cos(lat2);
        var x = Math.cos(lat1) * Math.sin(lat2) -
          Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      }

      function updateActionButtons() {
        var isLoggedIn = Boolean(currentUser);
        signinBtn.disabled = isBusy || isLoggedIn;

        signoutBtn.disabled = isBusy || !isLoggedIn;

        signupSubmitBtn.disabled = isBusy;
        signupCancelBtn.disabled = isBusy;

        openCreateJourneyBtn.disabled = isBusy || !isLoggedIn;
        openMyJourneysBtn.disabled = isBusy || !isLoggedIn;
        exitJourneyViewBtn.disabled = isBusy || !activeJourneyView;

        journeyEditorSaveBtn.disabled = isBusy;
        journeyEditorCancelBtn.disabled = isBusy;
        journeysModalCloseBtn.disabled = isBusy;

        recordBtn.disabled = isBusy || !isLoggedIn;
        undoBtn.disabled = isBusy || !isLoggedIn || points.length === 0;
      }

      function toErrorMessage(error) {
        if (!error) return "未知错误";
        if (typeof error === "string") return error;
        if (error.message) return error.message;
        return "请求失败";
      }

      function formatDateTime(ts) {
        return new Date(ts).toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        });
      }
    })();
  </script>
</body>
</html>
