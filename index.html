<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>人生足迹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    :root {
      --bg-a: #f5f7ef;
      --bg-b: #e8efe1;
      --ink: #1f2d22;
      --accent: #2c7a5d;
      --accent-soft: #cfe7dc;
      --warn: #b15f33;
      --card: rgba(255, 255, 255, 0.92);
      --stroke: rgba(31, 45, 34, 0.16);
      --shadow: 0 16px 38px rgba(31, 45, 34, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Noto Sans SC", "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, #dcefd9 0%, transparent 30%),
        radial-gradient(circle at 90% 92%, #f1ddcb 0%, transparent 28%),
        linear-gradient(140deg, var(--bg-a), var(--bg-b));
      padding: calc(12px + env(safe-area-inset-top, 0px)) 12px calc(104px + env(safe-area-inset-bottom, 0px));
    }

    .shell {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .headline,
    .auth-card,
    .filters-card,
    .map-card,
    .history-card,
    .modal-panel {
      border: 1px solid var(--stroke);
      border-radius: 14px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .headline {
      padding: 12px 16px;
      backdrop-filter: blur(4px);
    }

    h1 {
      font-size: clamp(1.2rem, 2.4vw, 1.8rem);
      font-family: "Manrope", sans-serif;
      letter-spacing: 0.02em;
    }

    .workspace {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 320px;
      gap: 12px;
      align-items: start;
    }

    .left-panel {
      display: grid;
      gap: 12px;
    }

    .auth-card,
    .filters-card {
      padding: 12px;
    }

    .card-title {
      font-size: 0.95rem;
      font-family: "Manrope", sans-serif;
      margin-bottom: 8px;
    }

    .auth-form,
    .filters-form,
    .modal-form {
      display: grid;
      gap: 8px;
    }

    .auth-form input,
    .modal-form input {
      border: 1px solid var(--stroke);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font-size: 0.84rem;
      font-family: inherit;
      min-width: 0;
    }

    .auth-actions,
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .auth-status,
    .auth-message,
    .modal-message {
      margin-top: 8px;
      font-size: 0.82rem;
      line-height: 1.45;
      color: rgba(31, 45, 34, 0.8);
      word-break: break-word;
    }

    .auth-status strong {
      color: #174232;
    }

    .auth-message.warn,
    .modal-message.warn {
      color: var(--warn);
    }

    .filters-form label {
      font-size: 0.8rem;
      color: rgba(31, 45, 34, 0.75);
    }

    input[type="datetime-local"] {
      border: 1px solid var(--stroke);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font-size: 0.83rem;
      font-family: inherit;
      min-width: 0;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.84rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-main {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 18px rgba(44, 122, 93, 0.24);
    }

    .btn-danger {
      background: #9d3e26;
      color: #fff;
      box-shadow: 0 8px 18px rgba(157, 62, 38, 0.22);
    }

    .btn-plain {
      background: #fff;
      border-color: var(--stroke);
      color: var(--ink);
    }

    .mode-row,
    .range-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-btn {
      background: var(--accent-soft);
      color: #174232;
    }

    .mode-btn.active {
      background: #174232;
      color: #fff;
    }

    .map-card {
      min-height: 460px;
    }

    #map {
      width: 100%;
      height: min(76vh, 760px);
      min-height: 460px;
    }

    .history-head {
      padding: 12px;
      border-bottom: 1px solid var(--stroke);
    }

    .history-head h2 {
      font-size: 1rem;
      font-family: "Manrope", sans-serif;
    }

    .history-head p {
      margin-top: 4px;
      font-size: 0.82rem;
      color: rgba(31, 45, 34, 0.7);
    }

    .history-list {
      list-style: none;
      max-height: min(76vh, 760px);
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--stroke);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.92);
    }

    .history-item time {
      font-size: 0.78rem;
      color: rgba(31, 45, 34, 0.7);
      display: block;
      margin-bottom: 4px;
    }

    .history-item .place {
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.35;
      color: #184534;
      margin-bottom: 2px;
    }

    .history-item .coord {
      font-size: 0.81rem;
      line-height: 1.35;
      color: rgba(31, 45, 34, 0.78);
    }

    .history-actions {
      margin-top: 6px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-mini {
      padding: 5px 8px;
      font-size: 0.75rem;
      border-radius: 8px;
    }

    .empty {
      padding: 14px;
      border: 1px dashed var(--stroke);
      border-radius: 10px;
      font-size: 0.85rem;
      color: rgba(31, 45, 34, 0.65);
      background: rgba(255, 255, 255, 0.7);
    }

    .action-bar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      z-index: 600;
      padding: 10px;
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: rgba(251, 253, 249, 0.96);
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status {
      font-size: 0.84rem;
      color: rgba(31, 45, 34, 0.8);
    }

    .status.warn {
      color: var(--warn);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 32, 26, 0.32);
      z-index: 900;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal.open {
      display: flex;
    }

    .modal-panel {
      width: min(460px, 100%);
      padding: 14px;
    }

    .modal-head {
      font-size: 1rem;
      font-family: "Manrope", sans-serif;
      margin-bottom: 8px;
    }

    .modal-sub {
      font-size: 0.82rem;
      color: rgba(31, 45, 34, 0.78);
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .track-arrow-icon {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      color: #8f4b29;
      font-weight: 700;
      font-size: 14px;
      transform-origin: center;
      text-shadow: 0 0 3px rgba(255, 255, 255, 0.85);
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .history-card {
        grid-column: 1 / span 2;
      }

      .history-list {
        max-height: 36vh;
      }
    }

    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .history-card {
        grid-column: auto;
      }

      #map {
        height: 58vh;
        min-height: 360px;
      }

      .history-list {
        max-height: 34vh;
      }
    }

    @media (max-width: 640px) {
      .auth-actions,
      .modal-actions,
      .mode-row,
      .range-actions {
        grid-template-columns: 1fr;
      }

      .action-bar {
        justify-content: flex-start;
      }

      .status {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="headline">
      <h1>人生足迹</h1>
    </header>

    <main class="workspace">
      <aside class="left-panel" aria-label="左侧控制区">
        <section class="auth-card" aria-label="登录区">
          <h2 class="card-title">账号登录</h2>
          <div class="auth-form">
            <input id="auth-email" type="email" placeholder="邮箱" autocomplete="email">
            <input id="auth-password" type="password" placeholder="密码（至少 6 位）" autocomplete="current-password">
            <div class="auth-actions">
              <button id="signin-btn" class="btn-main" type="button">登录</button>
              <button id="open-signup-btn" class="btn-plain" type="button">注册新账号</button>
              <button id="signout-btn" class="btn-danger" type="button" disabled>退出</button>
            </div>
          </div>
          <p id="auth-status" class="auth-status">登录状态：<strong>未登录</strong></p>
          <p id="auth-message" class="auth-message">提示：未登录时只能浏览空地图，登录后可读取并记录你的足迹。</p>
        </section>

        <section class="filters-card" aria-label="筛选区">
          <h2 class="card-title">时间筛选与显示模式</h2>
          <div class="filters-form">
            <label for="start-time">起始时间</label>
            <input id="start-time" type="datetime-local">
            <label for="end-time">结束时间</label>
            <input id="end-time" type="datetime-local">
            <div class="range-actions">
              <button id="apply-filter" class="btn-plain" type="button">应用区间</button>
              <button id="clear-filter" class="btn-plain" type="button">清空区间</button>
            </div>
            <div class="mode-row">
              <button id="mode-all" class="mode-btn active" type="button">显示全部地点</button>
              <button id="mode-track" class="mode-btn" type="button">显示行迹轨迹</button>
            </div>
          </div>
        </section>
      </aside>

      <section class="map-card" aria-label="地图区域">
        <div id="map"></div>
      </section>

      <aside class="history-card" aria-label="历史记录">
        <div class="history-head">
          <h2>去过的地点历史</h2>
          <p id="history-meta">总计 0 条记录</p>
        </div>
        <ul id="history-list" class="history-list"></ul>
      </aside>
    </main>
  </div>

  <div class="action-bar">
    <div class="action-buttons">
      <button id="record-btn" class="btn-main" type="button" disabled>记录我当前的位置</button>
      <button id="undo-btn" class="btn-danger" type="button" disabled>撤回上一次记录</button>
    </div>
    <p id="status" class="status">请先登录</p>
  </div>

  <section id="signup-modal" class="modal" aria-label="注册弹窗" aria-hidden="true">
    <div class="modal-panel">
      <h3 class="modal-head">注册新账号</h3>
      <p class="modal-sub">请输入邮箱和两次一致的密码，创建账号后可直接登录使用。</p>
      <div class="modal-form">
        <input id="signup-email" type="email" placeholder="注册邮箱" autocomplete="email">
        <input id="signup-password" type="password" placeholder="输入密码（至少 6 位）" autocomplete="new-password">
        <input id="signup-password-confirm" type="password" placeholder="再次输入密码" autocomplete="new-password">
        <div class="modal-actions">
          <button id="signup-submit-btn" class="btn-main" type="button">确认注册</button>
          <button id="signup-cancel-btn" class="btn-plain" type="button">取消</button>
        </div>
      </div>
      <p id="signup-message" class="modal-message">注册成功后会自动尝试登录。</p>
    </div>
  </section>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var SUPABASE_URL = "https://czzjoepcuvjkfugxjden.supabase.co";
      var SUPABASE_ANON_KEY = "sb_publishable_NoBiC-LB6xyxnBNAxdku4A_sSP5Om50";
      var PLACE_CACHE_KEY = "travel_place_cache_v1";

      var points = [];
      var currentMode = "all";
      var currentUser = null;
      var isBusy = false;
      var dbHasPlaceColumn = true;
      var placeColumnWarned = false;
      var updatePolicyWarned = false;
      var placeCache = loadPlaceCache();
      var placeLookupInFlight = {};
      var pointResolveInFlight = {};

      var authEmailInput = document.getElementById("auth-email");
      var authPasswordInput = document.getElementById("auth-password");
      var signinBtn = document.getElementById("signin-btn");
      var openSignupBtn = document.getElementById("open-signup-btn");
      var signoutBtn = document.getElementById("signout-btn");
      var authStatus = document.getElementById("auth-status");
      var authMessage = document.getElementById("auth-message");

      var signupModal = document.getElementById("signup-modal");
      var signupEmailInput = document.getElementById("signup-email");
      var signupPasswordInput = document.getElementById("signup-password");
      var signupPasswordConfirmInput = document.getElementById("signup-password-confirm");
      var signupSubmitBtn = document.getElementById("signup-submit-btn");
      var signupCancelBtn = document.getElementById("signup-cancel-btn");
      var signupMessage = document.getElementById("signup-message");

      var startInput = document.getElementById("start-time");
      var endInput = document.getElementById("end-time");
      var applyFilterBtn = document.getElementById("apply-filter");
      var clearFilterBtn = document.getElementById("clear-filter");
      var modeAllBtn = document.getElementById("mode-all");
      var modeTrackBtn = document.getElementById("mode-track");
      var recordBtn = document.getElementById("record-btn");
      var undoBtn = document.getElementById("undo-btn");
      var statusText = document.getElementById("status");
      var historyList = document.getElementById("history-list");
      var historyMeta = document.getElementById("history-meta");

      var map = L.map("map", { zoomControl: true }).setView([25, 110], 4);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);

      var markerLayer = L.layerGroup().addTo(map);
      var trackLayer = L.layerGroup().addTo(map);

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        setStatus("Supabase SDK 加载失败，请刷新页面重试", true);
        setAuthMessage("Supabase SDK 加载失败，请检查网络或稍后重试", true);
        return;
      }

      var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });

      bindEvents();
      bindAuthListener();
      render(false);
      initializeSession();
      window.addEventListener("resize", function () {
        map.invalidateSize();
      });

      function bindEvents() {
        signinBtn.addEventListener("click", function () {
          signIn();
        });

        openSignupBtn.addEventListener("click", function () {
          openSignupModal();
        });

        signoutBtn.addEventListener("click", function () {
          signOut();
        });

        signupSubmitBtn.addEventListener("click", function () {
          signUpFromModal();
        });

        signupCancelBtn.addEventListener("click", function () {
          closeSignupModal();
        });

        signupModal.addEventListener("click", function (event) {
          if (event.target === signupModal) {
            closeSignupModal();
          }
        });

        applyFilterBtn.addEventListener("click", function () {
          setStatus("已应用时间区间筛选", false);
          render(false);
        });

        clearFilterBtn.addEventListener("click", function () {
          startInput.value = "";
          endInput.value = "";
          setStatus("已清空时间区间", false);
          render(false);
        });

        modeAllBtn.addEventListener("click", function () {
          currentMode = "all";
          modeAllBtn.classList.add("active");
          modeTrackBtn.classList.remove("active");
          render(false);
        });

        modeTrackBtn.addEventListener("click", function () {
          currentMode = "track";
          modeTrackBtn.classList.add("active");
          modeAllBtn.classList.remove("active");
          render(false);
        });

        recordBtn.addEventListener("click", function () {
          addCurrentLocation();
        });

        undoBtn.addEventListener("click", function () {
          undoLastRecord();
        });
      }

      function bindAuthListener() {
        supabaseClient.auth.onAuthStateChange(function (_event, session) {
          currentUser = session ? session.user : null;
          setAuthStatus();
          updateActionButtons();

          if (currentUser) {
            fetchPointsFromDb().then(function () {
              setStatus("已登录并同步你的记录", false);
            }).catch(function (error) {
              setStatus("读取云端数据失败：" + toErrorMessage(error), true);
            });
          } else {
            points = [];
            render(false);
          }
        });
      }

      async function initializeSession() {
        setBusy(true, "检查登录状态...");
        try {
          var sessionResult = await supabaseClient.auth.getSession();
          if (sessionResult.error) {
            throw sessionResult.error;
          }

          currentUser = sessionResult.data.session ? sessionResult.data.session.user : null;
          setAuthStatus();

          if (currentUser) {
            await fetchPointsFromDb();
            setStatus("已恢复登录状态，并同步云端记录", false);
          } else {
            setStatus("请先登录后记录位置", false);
          }
        } catch (error) {
          setStatus("会话初始化失败：" + toErrorMessage(error), true);
          setAuthMessage("会话初始化失败：" + toErrorMessage(error), true);
        } finally {
          setBusy(false);
        }
      }

      function openSignupModal() {
        signupEmailInput.value = authEmailInput.value.trim();
        signupPasswordInput.value = "";
        signupPasswordConfirmInput.value = "";
        setSignupMessage("注册成功后会自动尝试登录。", false);
        signupModal.classList.add("open");
        signupModal.setAttribute("aria-hidden", "false");
      }

      function closeSignupModal() {
        signupModal.classList.remove("open");
        signupModal.setAttribute("aria-hidden", "true");
      }

      async function signUpFromModal() {
        if (isBusy) return;

        var email = signupEmailInput.value.trim();
        var password = signupPasswordInput.value;
        var confirm = signupPasswordConfirmInput.value;

        if (!email || !password || !confirm) {
          setSignupMessage("请完整填写邮箱和两次密码", true);
          return;
        }

        if (password.length < 6) {
          setSignupMessage("密码至少 6 位", true);
          return;
        }

        if (password !== confirm) {
          setSignupMessage("两次密码不一致，请重新输入", true);
          return;
        }

        setBusy(true, "注册中...");
        setSignupMessage("正在注册，请稍候...", false);

        try {
          var signUpResult = await supabaseClient.auth.signUp({
            email: email,
            password: password
          });

          if (signUpResult.error) {
            throw signUpResult.error;
          }

          if (signUpResult.data && signUpResult.data.session) {
            authEmailInput.value = email;
            authPasswordInput.value = password;
            closeSignupModal();
            setStatus("注册并登录成功", false);
            setAuthMessage("注册并登录成功", false);
            return;
          }

          var loginResult = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (loginResult.error) {
            setSignupMessage("注册成功，但自动登录失败，请直接在登录区登录。", true);
            setStatus("注册成功，但尚未登录", true);
            return;
          }

          authEmailInput.value = email;
          authPasswordInput.value = password;
          closeSignupModal();
          setStatus("注册并登录成功", false);
          setAuthMessage("注册并登录成功", false);
        } catch (error) {
          var msg = toErrorMessage(error);
          setSignupMessage("注册失败：" + msg, true);
          setStatus("注册失败：" + msg, true);
        } finally {
          setBusy(false);
        }
      }

      async function signIn() {
        var email = authEmailInput.value.trim();
        var password = authPasswordInput.value;

        if (!email || !password) {
          setStatus("请输入邮箱和密码", true);
          setAuthMessage("请输入邮箱和密码", true);
          return;
        }

        if (password.length < 6) {
          setStatus("密码至少 6 位", true);
          setAuthMessage("密码至少 6 位", true);
          return;
        }

        setBusy(true, "登录中...");
        setAuthMessage("正在登录，请稍候...", false);

        try {
          var result = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (result.error) {
            throw result.error;
          }

          setStatus("登录成功", false);
          setAuthMessage("登录成功", false);
        } catch (error) {
          var msg = toErrorMessage(error);
          setStatus("登录失败：" + msg, true);
          setAuthMessage("登录失败：" + msg, true);
        } finally {
          setBusy(false);
        }
      }

      async function signOut() {
        setBusy(true, "退出登录中...");
        try {
          var result = await supabaseClient.auth.signOut();
          if (result.error) {
            throw result.error;
          }

          currentUser = null;
          points = [];
          render(false);
          setAuthStatus();
          setStatus("已退出登录", false);
          setAuthMessage("已退出登录", false);
        } catch (error) {
          var msg = toErrorMessage(error);
          setStatus("退出登录失败：" + msg, true);
          setAuthMessage("退出登录失败：" + msg, true);
        } finally {
          setBusy(false);
        }
      }

      async function fetchPointsFromDb() {
        if (!currentUser) {
          points = [];
          render(false);
          return;
        }

        var rows = [];

        if (dbHasPlaceColumn) {
          var withPlace = await supabaseClient
            .from("travel_points")
            .select("id, lat, lng, visited_at, place_name")
            .eq("user_id", currentUser.id)
            .order("visited_at", { ascending: true });

          if (withPlace.error) {
            if (isMissingPlaceColumnError(withPlace.error)) {
              dbHasPlaceColumn = false;
              warnPlaceColumnMissing();
            } else {
              throw withPlace.error;
            }
          } else {
            rows = withPlace.data || [];
          }
        }

        if (!dbHasPlaceColumn) {
          var withoutPlace = await supabaseClient
            .from("travel_points")
            .select("id, lat, lng, visited_at")
            .eq("user_id", currentUser.id)
            .order("visited_at", { ascending: true });

          if (withoutPlace.error) {
            throw withoutPlace.error;
          }
          rows = withoutPlace.data || [];
        }

        points = rows.map(function (row) {
          return {
            id: row.id,
            lat: Number(row.lat),
            lng: Number(row.lng),
            timestamp: new Date(row.visited_at).getTime(),
            placeName: row.place_name || ""
          };
        });

        render(false);
        updateActionButtons();
        hydrateMissingPlaceNames(points);
      }

      async function addCurrentLocation() {
        if (!currentUser) {
          setStatus("请先登录", true);
          return;
        }

        if (!navigator.geolocation) {
          setStatus("当前浏览器不支持地理定位", true);
          return;
        }

        setBusy(true, "定位中...");

        navigator.geolocation.getCurrentPosition(
          async function (pos) {
            try {
              var lat = Number(pos.coords.latitude.toFixed(6));
              var lng = Number(pos.coords.longitude.toFixed(6));
              var visitedAt = new Date().toISOString();
              var placeName = await resolvePlaceName(lat, lng);

              var payload = {
                user_id: currentUser.id,
                lat: lat,
                lng: lng,
                visited_at: visitedAt
              };

              if (dbHasPlaceColumn && placeName) {
                payload.place_name = placeName;
              }

              var result = await supabaseClient
                .from("travel_points")
                .insert(payload)
                .select(dbHasPlaceColumn ? "id, lat, lng, visited_at, place_name" : "id, lat, lng, visited_at")
                .single();

              if (result.error && isMissingPlaceColumnError(result.error)) {
                dbHasPlaceColumn = false;
                warnPlaceColumnMissing();
                delete payload.place_name;
                result = await supabaseClient
                  .from("travel_points")
                  .insert(payload)
                  .select("id, lat, lng, visited_at")
                  .single();
              }

              if (result.error) {
                throw result.error;
              }

              points.push({
                id: result.data.id,
                lat: Number(result.data.lat),
                lng: Number(result.data.lng),
                timestamp: new Date(result.data.visited_at).getTime(),
                placeName: result.data.place_name || placeName || ""
              });
              points.sort(function (a, b) { return a.timestamp - b.timestamp; });

              render(true);
              updateActionButtons();
              setStatus("已记录：" + (placeName || "新地点"), false);
            } catch (error) {
              setStatus("保存失败：" + toErrorMessage(error), true);
            } finally {
              setBusy(false);
            }
          },
          function (error) {
            var message = "定位失败";
            if (error.code === 1) message = "定位失败：你拒绝了定位权限";
            if (error.code === 2) message = "定位失败：位置信息不可用";
            if (error.code === 3) message = "定位失败：获取定位超时";
            setStatus(message, true);
            setBusy(false);
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      }

      async function undoLastRecord() {
        if (!currentUser) {
          setStatus("请先登录", true);
          return;
        }

        if (!points.length) {
          setStatus("没有可撤回的记录", true);
          return;
        }

        var latest = points[points.length - 1];
        setBusy(true, "撤回中...");

        try {
          var result = await supabaseClient
            .from("travel_points")
            .delete()
            .eq("id", latest.id)
            .eq("user_id", currentUser.id);

          if (result.error) {
            throw result.error;
          }

          points = points.filter(function (p) {
            return p.id !== latest.id;
          });

          render(false);
          updateActionButtons();
          setStatus("已撤回最后一条记录：" + (latest.placeName || formatDateTime(latest.timestamp)), false);
        } catch (error) {
          setStatus("撤回失败：" + toErrorMessage(error), true);
        } finally {
          setBusy(false);
        }
      }

      function hydrateMissingPlaceNames(items) {
        items.forEach(function (point) {
          if (point.placeName || pointResolveInFlight[point.id]) return;

          pointResolveInFlight[point.id] = true;
          resolvePlaceName(point.lat, point.lng)
            .then(function (name) {
              if (!name) return;
              point.placeName = name;
              render(false);
              if (dbHasPlaceColumn && currentUser) {
                persistPointPlaceName(point);
              }
            })
            .catch(function () {
            })
            .finally(function () {
              delete pointResolveInFlight[point.id];
            });
        });
      }

      async function persistPointPlaceName(point) {
        var result = await supabaseClient
          .from("travel_points")
          .update({ place_name: point.placeName })
          .eq("id", point.id)
          .eq("user_id", currentUser.id);

        if (result.error && isMissingPlaceColumnError(result.error)) {
          dbHasPlaceColumn = false;
          warnPlaceColumnMissing();
          return;
        }

        if (result.error && isUpdatePolicyError(result.error)) {
          warnUpdatePolicyMissing();
        }
      }

      async function renamePointFromUser(pointId, currentName) {
        if (!currentUser) {
          setStatus("请先登录", true);
          return;
        }

        var nextName = window.prompt("请输入新的地点名：", currentName || "");
        if (nextName === null) return;
        nextName = nextName.trim();

        if (!nextName) {
          setStatus("地点名不能为空", true);
          return;
        }

        var target = null;
        for (var i = 0; i < points.length; i += 1) {
          if (points[i].id === pointId) {
            target = points[i];
            break;
          }
        }

        if (!target) {
          setStatus("未找到目标记录，请刷新后重试", true);
          return;
        }

        if (!dbHasPlaceColumn) {
          warnPlaceColumnMissing();
          return;
        }

        setBusy(true, "保存地点名中...");
        try {
          var result = await supabaseClient
            .from("travel_points")
            .update({ place_name: nextName })
            .eq("id", pointId)
            .eq("user_id", currentUser.id);

          if (result.error) {
            if (isMissingPlaceColumnError(result.error)) {
              dbHasPlaceColumn = false;
              warnPlaceColumnMissing();
              return;
            }
            if (isUpdatePolicyError(result.error)) {
              warnUpdatePolicyMissing();
              return;
            }
            throw result.error;
          }

          target.placeName = nextName;
          placeCache[target.lat.toFixed(5) + "," + target.lng.toFixed(5)] = nextName;
          savePlaceCache(placeCache);
          render(false);
          setStatus("地点名已更新", false);
        } catch (error) {
          setStatus("地点名更新失败：" + toErrorMessage(error), true);
        } finally {
          setBusy(false);
        }
      }

      async function resolvePlaceName(lat, lng) {
        var key = lat.toFixed(5) + "," + lng.toFixed(5);
        if (placeCache[key]) {
          return placeCache[key];
        }

        if (placeLookupInFlight[key]) {
          return placeLookupInFlight[key];
        }

        placeLookupInFlight[key] = fetch(
          "https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=" +
          encodeURIComponent(lat) +
          "&lon=" +
          encodeURIComponent(lng) +
          "&zoom=18&addressdetails=1",
          {
            headers: {
              "Accept-Language": "zh-CN,en;q=0.8"
            }
          }
        )
          .then(function (resp) {
            if (!resp.ok) return null;
            return resp.json();
          })
          .then(function (data) {
            var name = extractPlaceName(data);
            if (name) {
              placeCache[key] = name;
              savePlaceCache(placeCache);
            }
            return name || "";
          })
          .catch(function () {
            return "";
          })
          .finally(function () {
            delete placeLookupInFlight[key];
          });

        return placeLookupInFlight[key];
      }

      function extractPlaceName(data) {
        if (!data) return "";
        if (typeof data.name === "string" && data.name.trim()) {
          return data.name.trim();
        }

        var address = data.address || {};
        var keys = [
          "attraction",
          "building",
          "amenity",
          "shop",
          "office",
          "tourism",
          "leisure",
          "road",
          "neighbourhood",
          "suburb",
          "city",
          "town",
          "state"
        ];

        for (var i = 0; i < keys.length; i += 1) {
          var v = address[keys[i]];
          if (typeof v === "string" && v.trim()) {
            return v.trim();
          }
        }

        if (typeof data.display_name === "string" && data.display_name.trim()) {
          return data.display_name.split(",")[0].trim();
        }

        return "";
      }

      function loadPlaceCache() {
        try {
          var raw = localStorage.getItem(PLACE_CACHE_KEY);
          if (!raw) return {};
          var parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return {};
          return parsed;
        } catch (_e) {
          return {};
        }
      }

      function savePlaceCache(cache) {
        try {
          localStorage.setItem(PLACE_CACHE_KEY, JSON.stringify(cache));
        } catch (_e) {
        }
      }

      function warnPlaceColumnMissing() {
        if (placeColumnWarned) return;
        placeColumnWarned = true;
        setStatus("数据库缺少 place_name 列，无法持久化地点名。请在 Supabase 执行：alter table public.travel_points add column if not exists place_name text;", true);
      }

      function warnUpdatePolicyMissing() {
        if (updatePolicyWarned) return;
        updatePolicyWarned = true;
        setStatus("数据库缺少 update 权限策略，无法修改地点名。请执行：create policy \"Users can update own points\" on public.travel_points for update to authenticated using ((select auth.uid()) = user_id) with check ((select auth.uid()) = user_id);", true);
      }

      function isMissingPlaceColumnError(error) {
        var msg = toErrorMessage(error).toLowerCase();
        return msg.indexOf("place_name") !== -1 && msg.indexOf("does not exist") !== -1;
      }

      function isUpdatePolicyError(error) {
        var msg = toErrorMessage(error).toLowerCase();
        return msg.indexOf("permission denied") !== -1 || msg.indexOf("row-level security") !== -1;
      }

      function getFilteredPoints() {
        var start = startInput.value ? new Date(startInput.value).getTime() : null;
        var end = endInput.value ? new Date(endInput.value).getTime() : null;

        return points.filter(function (p) {
          var okStart = start === null || p.timestamp >= start;
          var okEnd = end === null || p.timestamp <= end;
          return okStart && okEnd;
        });
      }

      function render(focusLatest) {
        var filtered = getFilteredPoints();
        markerLayer.clearLayers();
        trackLayer.clearLayers();

        if (currentMode === "all") {
          filtered.forEach(function (p, idx) {
            L.circleMarker([p.lat, p.lng], {
              radius: 7,
              color: "#1f5e48",
              fillColor: "#2c7a5d",
              fillOpacity: 0.88,
              weight: 2
            })
              .bindPopup(
                "第 " +
                (idx + 1) +
                " 个点<br>" +
                (p.placeName || "地点解析中...") +
                "<br>" +
                formatDateTime(p.timestamp) +
                "<br>" +
                p.lat +
                ", " +
                p.lng
              )
              .addTo(markerLayer);
          });
        } else {
          var latLngs = filtered.map(function (p) {
            return [p.lat, p.lng];
          });

          if (latLngs.length > 1) {
            L.polyline(latLngs, {
              color: "#b15f33",
              weight: 4,
              opacity: 0.9,
              lineJoin: "round"
            }).addTo(trackLayer);
            drawTrackArrows(latLngs);
          }

          filtered.forEach(function (p, idx) {
            L.circleMarker([p.lat, p.lng], {
              radius: 6,
              color: "#8f4b29",
              fillColor: "#d98153",
              fillOpacity: 0.95,
              weight: 2
            })
              .bindPopup(
                "轨迹点 " +
                (idx + 1) +
                "<br>" +
                (p.placeName || "地点解析中...") +
                "<br>" +
                formatDateTime(p.timestamp) +
                "<br>" +
                p.lat +
                ", " +
                p.lng
              )
              .addTo(trackLayer);
          });
        }

        renderHistory(filtered);
        adjustMap(filtered, focusLatest);
      }

      function renderHistory(filtered) {
        historyList.innerHTML = "";
        historyMeta.textContent = "总计 " + points.length + " 条记录，当前显示 " + filtered.length + " 条";

        if (!filtered.length) {
          var empty = document.createElement("li");
          empty.className = "empty";
          empty.textContent = currentUser
            ? "当前没有符合条件的记录。点击底部按钮开始记录。"
            : "请先登录后查看和记录你自己的足迹。";
          historyList.appendChild(empty);
          return;
        }

        var reversed = filtered.slice().reverse();
        reversed.forEach(function (p, index) {
          var li = document.createElement("li");
          li.className = "history-item";

          var t = document.createElement("time");
          t.textContent = formatDateTime(p.timestamp);

          var place = document.createElement("p");
          place.className = "place";
          place.textContent = "#" + (filtered.length - index) + "  " + (p.placeName || "地点解析中...");

          var coord = document.createElement("p");
          coord.className = "coord";
          coord.textContent = "纬度: " + p.lat + "，经度: " + p.lng;

          var actions = document.createElement("div");
          actions.className = "history-actions";

          var renameBtn = document.createElement("button");
          renameBtn.className = "btn-plain btn-mini";
          renameBtn.type = "button";
          renameBtn.textContent = "修改地点名";
          renameBtn.addEventListener("click", function () {
            renamePointFromUser(p.id, p.placeName || "");
          });

          actions.appendChild(renameBtn);

          li.appendChild(t);
          li.appendChild(place);
          li.appendChild(coord);
          li.appendChild(actions);
          historyList.appendChild(li);
        });
      }

      function adjustMap(filtered, focusLatest) {
        if (!filtered.length) {
          map.setView([25, 110], 4);
          return;
        }

        if (focusLatest) {
          var latest = filtered[filtered.length - 1];
          map.setView([latest.lat, latest.lng], 13, { animate: true });
          return;
        }

        if (filtered.length === 1) {
          map.setView([filtered[0].lat, filtered[0].lng], 13);
          return;
        }

        var bounds = L.latLngBounds(filtered.map(function (p) { return [p.lat, p.lng]; }));
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
      }

      function drawTrackArrows(latLngs) {
        for (var i = 0; i < latLngs.length - 1; i += 1) {
          var from = latLngs[i];
          var to = latLngs[i + 1];
          var mid = [(from[0] + to[0]) / 2, (from[1] + to[1]) / 2];
          var angle = computeBearingDeg(from, to);

          L.marker(mid, {
            icon: L.divIcon({
              className: "",
              html: '<div class="track-arrow-icon" style="transform: rotate(' + (angle - 90).toFixed(1) + 'deg);">➤</div>',
              iconSize: [18, 18],
              iconAnchor: [9, 9]
            }),
            keyboard: false,
            interactive: false
          }).addTo(trackLayer);
        }
      }

      function computeBearingDeg(from, to) {
        var lat1 = from[0] * Math.PI / 180;
        var lat2 = to[0] * Math.PI / 180;
        var dLon = (to[1] - from[1]) * Math.PI / 180;
        var y = Math.sin(dLon) * Math.cos(lat2);
        var x = Math.cos(lat1) * Math.sin(lat2) -
          Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      }

      function setAuthStatus() {
        if (!currentUser) {
          authStatus.innerHTML = "登录状态：<strong>未登录</strong>";
          return;
        }
        authStatus.innerHTML = "登录状态：<strong>已登录</strong>（" + currentUser.email + "）";
      }

      function setAuthMessage(text, isWarn) {
        authMessage.textContent = text;
        authMessage.classList.toggle("warn", Boolean(isWarn));
      }

      function setSignupMessage(text, isWarn) {
        signupMessage.textContent = text;
        signupMessage.classList.toggle("warn", Boolean(isWarn));
      }

      function setStatus(text, isWarn) {
        statusText.textContent = text;
        statusText.classList.toggle("warn", Boolean(isWarn));
      }

      function setBusy(busy, text) {
        isBusy = busy;
        if (busy && text) {
          setStatus(text, false);
        }
        updateActionButtons();
      }

      function updateActionButtons() {
        var isLoggedIn = Boolean(currentUser);
        signinBtn.disabled = isBusy || isLoggedIn;
        openSignupBtn.disabled = isBusy || isLoggedIn;
        signoutBtn.disabled = isBusy || !isLoggedIn;
        signupSubmitBtn.disabled = isBusy;
        signupCancelBtn.disabled = isBusy;
        recordBtn.disabled = isBusy || !isLoggedIn;
        undoBtn.disabled = isBusy || !isLoggedIn || points.length === 0;
      }

      function toErrorMessage(error) {
        if (!error) return "未知错误";
        if (typeof error === "string") return error;
        if (error.message) return error.message;
        return "请求失败";
      }

      function formatDateTime(ts) {
        return new Date(ts).toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        });
      }
    })();
  </script>
</body>
