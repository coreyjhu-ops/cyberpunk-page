<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corey's Toolbox</title>
  <style>
    :root {
      --bg-1: #070b1b;
      --bg-2: #111a3a;
      --neon-cyan: #1ff5ff;
      --neon-pink: #ff3bf5;
      --neon-gold: #ffe066;
      --text: #d9eeff;
      --panel: rgba(9, 15, 40, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Orbitron", "Rajdhani", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(31, 245, 255, 0.15), transparent 28%),
        radial-gradient(circle at 85% 78%, rgba(255, 59, 245, 0.14), transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 85%, transparent);
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(20px, 4vw, 48px);
    }

    .hero {
      width: min(960px, 100%);
      min-height: min(80svh, 760px);
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: clamp(18px, 2.5vw, 36px);
      align-items: stretch;
    }

    .panel {
      border: 1px solid rgba(31, 245, 255, 0.6);
      background: linear-gradient(160deg, var(--panel), rgba(8, 10, 25, 0.74));
      backdrop-filter: blur(5px);
      border-radius: 16px;
      box-shadow:
        0 0 0 1px rgba(255, 59, 245, 0.15) inset,
        0 0 26px rgba(31, 245, 255, 0.14),
        0 0 46px rgba(255, 59, 245, 0.12);
      padding: clamp(20px, 4vw, 42px);
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: clamp(12px, 2vw, 20px);
    }

    .tag {
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--neon-cyan);
      text-shadow: 0 0 12px rgba(31, 245, 255, 0.6);
    }

    h1 {
      font-size: clamp(1.9rem, 5.5vw, 4.2rem);
      line-height: 1.02;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #f2f8ff;
      text-shadow:
        0 0 12px rgba(255, 59, 245, 0.55),
        0 0 24px rgba(31, 245, 255, 0.35);
    }

    .subtitle {
      max-width: 42ch;
      font-size: clamp(0.95rem, 1.6vw, 1.15rem);
      line-height: 1.6;
      color: rgba(217, 238, 255, 0.86);
    }

    .rate-badge {
      position: fixed;
      top: clamp(12px, 3vw, 24px);
      left: clamp(12px, 3vw, 24px);
      z-index: 3;
      border: 1px solid rgba(31, 245, 255, 0.65);
      background: rgba(6, 10, 25, 0.78);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: clamp(0.78rem, 1.5vw, 0.95rem);
      letter-spacing: 0.06em;
      backdrop-filter: blur(6px);
      box-shadow:
        0 0 0 1px rgba(255, 59, 245, 0.2) inset,
        0 0 16px rgba(31, 245, 255, 0.2);
    }

    .converter {
      margin-top: clamp(12px, 2vw, 18px);
      border: 1px solid rgba(255, 224, 102, 0.55);
      border-radius: 12px;
      padding: clamp(14px, 2.5vw, 18px);
      background: rgba(4, 8, 20, 0.62);
      display: grid;
      gap: 12px;
      max-width: 440px;
    }

    .converter h2 {
      font-size: clamp(0.95rem, 1.8vw, 1.1rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--neon-gold);
    }

    .converter-row {
      display: grid;
      gap: 8px;
    }

    .converter label {
      font-size: 0.85rem;
      color: rgba(217, 238, 255, 0.88);
      letter-spacing: 0.05em;
    }

    .converter select,
    .converter input {
      width: 100%;
      border: 1px solid rgba(31, 245, 255, 0.48);
      border-radius: 10px;
      background: rgba(3, 8, 22, 0.85);
      color: #e9f7ff;
      padding: 10px 12px;
      font-size: 1rem;
      outline: none;
    }

    .converter select:focus,
    .converter input:focus {
      border-color: rgba(255, 59, 245, 0.8);
      box-shadow: 0 0 0 3px rgba(255, 59, 245, 0.15);
    }

    .result {
      font-size: 0.95rem;
      line-height: 1.5;
      color: rgba(217, 238, 255, 0.95);
      min-height: 1.6em;
    }

    .result strong {
      color: var(--neon-cyan);
      text-shadow: 0 0 8px rgba(31, 245, 255, 0.55);
    }

    .right {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .core {
      width: min(100%, 320px);
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      position: relative;
      border: 1px solid rgba(255, 224, 102, 0.62);
      background:
        linear-gradient(120deg, rgba(255, 59, 245, 0.14), rgba(31, 245, 255, 0.14)),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.06) 0 2px,
          transparent 2px 10px
        );
      box-shadow:
        0 0 36px rgba(255, 224, 102, 0.22),
        0 0 60px rgba(31, 245, 255, 0.18);
      animation: pulse 3.4s ease-in-out infinite;
    }

    .core::before,
    .core::after {
      content: "";
      position: absolute;
      inset: 10%;
      border: 1px solid rgba(31, 245, 255, 0.65);
      border-radius: 12px;
    }

    .core::after {
      inset: 28%;
      border-color: rgba(255, 59, 245, 0.7);
    }

    @keyframes pulse {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-6px) scale(1.02);
      }
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .right {
        min-height: clamp(190px, 34vh, 300px);
      }

      .core {
        width: min(70vw, 290px);
      }
    }
  </style>
</head>
<body>
  <div class="grid-overlay" aria-hidden="true"></div>
  <div class="rate-badge" id="rate-badge">Loading rate...</div>

  <main class="page">
    <section class="hero">
      <article class="panel left">
        <p class="tag">Corey's Toolbox</p>
        <h1>Corey's<br>Toolbox</h1>
        <p class="subtitle">
          实时汇率与美元/人民币快速换算。保持赛博朋克视觉主题，并优先保证移动端和桌面端的显示比例。
        </p>
        <section class="converter" aria-label="汇率换算">
          <h2>USD / CNY Converter</h2>
          <div class="converter-row">
            <label for="currency-select">输入币种</label>
            <select id="currency-select">
              <option value="USD">美元 (USD)</option>
              <option value="CNY">人民币 (CNY)</option>
            </select>
          </div>
          <div class="converter-row">
            <label for="amount-input">输入金额</label>
            <input id="amount-input" type="number" inputmode="decimal" min="0" step="0.01" placeholder="例如 100">
          </div>
          <p class="result" id="result-text">请输入金额开始计算</p>
        </section>
      </article>

      <aside class="panel right">
        <div class="core" aria-hidden="true"></div>
      </aside>
    </section>
  </main>

  <script>
    (function () {
      var rateBadge = document.getElementById("rate-badge");
      var currencySelect = document.getElementById("currency-select");
      var amountInput = document.getElementById("amount-input");
      var resultText = document.getElementById("result-text");
      var usdToCny = null;

      function format(num) {
        return Number(num).toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function updateResult() {
        var raw = Number(amountInput.value);
        if (!usdToCny) {
          resultText.textContent = "汇率加载中，请稍后...";
          return;
        }
        if (!amountInput.value) {
          resultText.textContent = "请输入金额开始计算";
          return;
        }
        if (Number.isNaN(raw) || raw < 0) {
          resultText.textContent = "请输入有效的非负数字";
          return;
        }

        if (currencySelect.value === "USD") {
          var cnyValue = raw * usdToCny;
          resultText.innerHTML = "<strong>" + format(raw) + " USD</strong> = <strong>" + format(cnyValue) + " CNY</strong>";
        } else {
          var usdValue = raw / usdToCny;
          resultText.innerHTML = "<strong>" + format(raw) + " CNY</strong> = <strong>" + format(usdValue) + " USD</strong>";
        }
      }

      function updateBadge() {
        if (!usdToCny) {
          rateBadge.textContent = "1 USD = -- CNY";
          return;
        }
        rateBadge.textContent = "1 USD = " + usdToCny.toFixed(4) + " CNY";
      }

      function fetchRate() {
        fetch("https://api.frankfurter.app/latest?from=USD&to=CNY")
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (!data || !data.rates || !data.rates.CNY) {
              throw new Error("Invalid rate payload");
            }
            usdToCny = Number(data.rates.CNY);
            updateBadge();
            updateResult();
          })
          .catch(function () {
            rateBadge.textContent = "1 USD = N/A (fetch failed)";
            resultText.textContent = "无法获取实时汇率，请稍后刷新重试";
          });
      }

      currencySelect.addEventListener("change", updateResult);
      amountInput.addEventListener("input", updateResult);

      fetchRate();
    })();
  </script>
</body>
</html>
